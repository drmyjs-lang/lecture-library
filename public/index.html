<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مكتبة المحاضرات - العرض العام</title>
  <meta name="theme-color" content="#0d6fb8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #eef5ff;
      --bg-soft: #f8fbff;
      --card: rgba(255, 255, 255, 0.88);
      --card-solid: #ffffff;
      --text: #10243e;
      --muted: #5f738d;
      --line: rgba(13, 111, 184, 0.14);
      --blue: #0d6fb8;
      --blue-dark: #084a86;
      --blue-soft: #3ca3d8;
      --blue-pale: #dff1ff;
      --shadow-lg: 0 28px 70px rgba(11, 64, 122, 0.14);
      --shadow-md: 0 18px 40px rgba(15, 78, 145, 0.1);
      --shadow-sm: 0 10px 24px rgba(17, 72, 128, 0.08);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --transition: 0.22s ease;
      --font-stack: "Manrope", "IBM Plex Sans Arabic", sans-serif;
      --max: 1200px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-stack);
      color: var(--text);
      background:
        radial-gradient(circle at top right, rgba(60, 163, 216, 0.18), transparent 28%),
        radial-gradient(circle at bottom left, rgba(13, 111, 184, 0.1), transparent 32%),
        linear-gradient(180deg, #f5faff 0%, #edf5ff 52%, #eaf2fc 100%);
      min-height: 100vh;
    }

    .wrap {
      max-width: var(--max);
      margin: 0 auto;
      padding: 40px 20px 80px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      gap: 20px;
      flex-wrap: wrap;
    }

    .topbar h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 42px);
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .topbar a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 800;
      font-size: 15px;
      padding: 10px 20px;
      background: var(--blue-pale);
      border-radius: 14px;
      transition: all var(--transition);
    }

    .topbar a:hover {
      background: var(--blue);
      color: #fff;
      transform: translateY(-2px);
    }

    .toolbar {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 16px;
      margin-bottom: 40px;
      background: var(--card);
      padding: 16px;
      border-radius: var(--radius-lg);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.6);
      box-shadow: var(--shadow-sm);
    }

    .toolbar input,
    .toolbar select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 20px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      background: #fff;
      transition: all var(--transition);
    }

    .toolbar input:focus,
    .toolbar select:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 4px rgba(13, 111, 184, 0.1);
    }

    .state {
      text-align: center;
      padding: 40px;
      font-weight: 700;
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
    }

    .loading { background: var(--blue-pale); color: var(--blue-dark); }
    .error { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; }

    .month-sect { margin-bottom: 60px; }
    .month-sect h2 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid var(--line);
      color: var(--blue-dark);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      border-radius: var(--radius-lg);
      overflow: hidden;
      box-shadow: var(--shadow-md);
      transition: transform var(--transition), box-shadow var(--transition);
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: var(--shadow-lg);
    }

    .card-img {
      aspect-ratio: 16/9;
      background: #e9f2ff center/cover no-repeat;
      border-bottom: 1px solid var(--line);
    }

    .card-body { padding: 24px; flex-grow: 1; }

    .speaker {
      color: var(--blue);
      font-weight: 800;
      font-size: 13px;
      margin-bottom: 8px;
      display: block;
    }

    .title {
      margin: 0 0 12px;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.3;
    }

    .desc {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .files-list { display: grid; gap: 8px; }
    .file-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #f7fbff;
      border: 1px solid var(--line);
      border-radius: 12px;
      text-decoration: none;
      color: var(--text);
      font-weight: 700;
      font-size: 14px;
      transition: all var(--transition);
    }

    .file-btn:hover {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    .badge {
      font-size: 10px;
      background: rgba(13, 111, 184, 0.1);
      padding: 4px 8px;
      border-radius: 6px;
      color: var(--blue-dark);
    }

    @media (max-width: 768px) {
      .toolbar { grid-template-columns: 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="wrap">
    <div class="topbar">
      <h1>مكتبة المحاضرات</h1>
      <a href="/admin/login/">دخول الإدارة</a>
    </div>

    <div class="toolbar">
      <input type="text" id="searchInput" placeholder="ابحث عن محاضرة أو متحدث..." />
      <select id="sortSelect">
        <option value="newest">الأحدث أولاً</option>
        <option value="oldest">الأقدم أولاً</option>
        <option value="title">العنوان (أ-ي)</option>
      </select>
    </div>

    <div id="stateBox" class="state" style="display:none;"></div>

    <div id="content"></div>
  </div>

  <script>
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");
    const stateBox = document.getElementById("stateBox");
    const content = document.getElementById("content");

    let debounceTimer;

    function escapeHtml(str) {
      if (!str) return "";
      return str.replace(/[&<>"']/g, m => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      })[m]);
    }

    function formatMonth(dateStr) {
      if (!dateStr) return "تاريخ غير محدد";
      const d = new Date(dateStr);
      return new Intl.DateTimeFormat('ar-SA', { month: 'long', year: 'numeric' }).format(d);
    }

    function renderFiles(files) {
      if (!files || !files.length) return "";
      return `
        <div class="files-list">
          ${files.map(f => `
            <a href="${f.file_url}" target="_blank" class="file-btn">
              <span>${escapeHtml(f.file_name)}</span>
              <span class="badge">${f.file_type || 'ملف'}</span>
            </a>
          `).join("")}
        </div>
      `;
    }

    function renderLectures(items) {
      stateBox.style.display = "none";
      if (!items.length) {
        stateBox.style.display = "block";
        stateBox.className = "state";
        stateBox.textContent = "لا توجد نتائج تطابق بحثك.";
        content.innerHTML = "";
        return;
      }

      const groups = {};
      items.forEach(item => {
        const m = formatMonth(item.lecture_date);
        if (!groups[m]) groups[m] = [];
        groups[m].push(item);
      });

      content.innerHTML = Object.keys(groups).map(month => `
        <section class="month-sect">
          <h2>${month}</h2>
          <div class="grid">
            ${groups[month].map(l => `
              <article class="card">
                <div class="card-img" style="background-image: url('${l.stored_cover_image_url || l.cover_image_url || '/assets/placeholder.png'}')"></div>
                <div class="card-body">
                  <span class="speaker">${escapeHtml(l.speaker)}</span>
                  <h3 class="title">${escapeHtml(l.title)}</h3>
                  <p class="desc">${escapeHtml(l.description || "لا يوجد وصف لهذه المحاضرة.")}</p>
                  ${renderFiles(l.files || [])}
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `).join("");
    }

    async function loadLectures() {
      stateBox.style.display = "block";
      stateBox.className = "state loading";
      stateBox.textContent = "جاري تحميل المحاضرات...";
      
      try {
        const q = searchInput.value.trim();
        const sort = sortSelect.value;
        const url = new URL("/api/lectures", window.location.origin);
        if (q) url.searchParams.set("q", q);
        url.searchParams.set("sort", sort);

        const res = await fetch(url.toString());
        const data = await res.json();

        if (!res.ok || !data.ok) throw new Error(data.error || "فشل التحميل");

        renderLectures(data.items || []);
      } catch (error) {
        stateBox.style.display = "block";
        stateBox.className = "state error";
        stateBox.textContent = error.message;
        content.innerHTML = "";
      }
    }

    searchInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(loadLectures, 400);
    });

    sortSelect.addEventListener("change", loadLectures);

    // التحميل الأولي
    loadLectures();
  </script>
</body>
</html>
