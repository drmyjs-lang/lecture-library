<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل دخول الإدارة</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      color: #1f2937;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }
    .card {
      width: 100%;
      max-width: 420px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      padding: 28px;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 26px;
    }
    p {
      margin: 0 0 22px;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.7;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
      font-size: 14px;
    }
    input {
      width: 100%;
      padding: 13px 14px;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      outline: none;
      font-size: 14px;
      margin-bottom: 14px;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 13px 16px;
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    button:disabled {
      opacity: .7;
      cursor: not-allowed;
    }
    .status {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 12px;
      font-size: 14px;
      display: none;
      line-height: 1.6;
      white-space: pre-line;
    }
    .status.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .status.success {
      display: block;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .small {
      margin-top: 12px;
      color: #6b7280;
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>دخول الإدارة</h1>
    <p>أدخل كلمة المرور للوصول إلى صفحات الإدارة الخاصة بمكتبة المحاضرات.</p>

    <form id="loginForm">
      <label for="password">كلمة المرور</label>
      <input id="password" type="password" placeholder="أدخل كلمة المرور" required />
      <button id="loginBtn" type="submit">دخول</button>
      <div id="statusBox" class="status"></div>
    </form>

    <div class="small">Lecture Library Admin</div>
  </div>

  <script>
    const form = document.getElementById("loginForm");
    const passwordInput = document.getElementById("password");
    const loginBtn = document.getElementById("loginBtn");
    const statusBox = document.getElementById("statusBox");

    function setStatus(type, message) {
      statusBox.className = "status " + type;
      statusBox.style.display = "block";
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.style.display = "none";
      statusBox.textContent = "";
    }

    const params = new URLSearchParams(location.search);
    const next = params.get("next") || "/admin/lecture-upload/";

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearStatus();

      const password = passwordInput.value.trim();
      if (!password) {
        setStatus("error", "أدخل كلمة المرور أولًا");
        return;
      }

      try {
        loginBtn.disabled = true;
        loginBtn.textContent = "جارٍ الدخول...";

        const res = await fetch("/api/admin-login", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ password, next })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data.error || "فشل تسجيل الدخول");
        }

        setStatus("success", "تم تسجيل الدخول بنجاح...");
        location.href = data.next || next;
      } catch (err) {
        setStatus("error", err.message || "فشل تسجيل الدخول");
      } finally {
        loginBtn.disabled = false;
        loginBtn.textContent = "دخول";
      }
    });
  </script>
</body>
</html>
