<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture Upload - Admin</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 980px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    .muted {
      color: #6b7280;
      margin-bottom: 24px;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .field {
      margin-bottom: 16px;
    }
    .field.full {
      grid-column: 1 / -1;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      font-weight: 600;
    }
    input, textarea, select, button {
      width: 100%;
      font: inherit;
    }
    input, textarea, select {
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    .files-box {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 16px;
      background: #fafafa;
    }
    .file-row {
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      padding: 14px;
      background: white;
      margin-bottom: 12px;
    }
    .file-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .actions {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 700;
    }
    .btn-primary {
      background: #2563eb;
      color: white;
    }
    .btn-secondary {
      background: #eef2ff;
      color: #1d4ed8;
    }
    .btn-danger {
      background: #fee2e2;
      color: #b91c1c;
      margin-top: 12px;
    }
    .status {
      margin-top: 16px;
      padding: 14px;
      border-radius: 12px;
      display: none;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .status.ok {
      display: block;
      background: #ecfdf5;
      color: #065f46;
      border: 1px solid #a7f3d0;
    }
    .status.error {
      display: block;
      background: #fef2f2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    .top-links {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .top-links a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
    .cover-preview-wrap {
      margin-top: 10px;
      display: none;
    }
    .cover-preview-wrap.show {
      display: block;
    }
    .cover-preview {
      width: 100%;
      max-width: 320px;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      border-radius: 14px;
      border: 1px solid #e5e7eb;
      background: #f3f4f6;
      display: block;
    }
    .small-note {
      margin-top: 8px;
      font-size: 13px;
      color: #6b7280;
      line-height: 1.5;
    }
    .file-meta {
      border: 1px dashed #d1d5db;
      border-radius: 12px;
      padding: 12px 14px;
      background: #f9fafb;
      color: #374151;
      min-height: 48px;
      display: flex;
      align-items: center;
      line-height: 1.5;
    }
    .site-footer {
      margin-top: 24px;
      text-align: center;
      color: #6b7280;
      font-size: 14px;
    }
    .site-footer a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 600;
    }
    @media (max-width: 760px) {
      .grid, .file-grid {
        grid-template-columns: 1fr;
      }
      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top-links">
      <a href="/lecture-library/">Open Lecture Library</a>
      <a href="/">Home</a>
    </div>

    <div class="card">
      <h1>Lecture Upload</h1>
      <div class="muted">
        Admin form for creating lectures. Cover image and lecture files are uploaded from your computer.
      </div>

      <form id="lectureForm">
        <div class="grid">
          <div class="field">
            <label for="title">Lecture Title</label>
            <input id="title" name="title" required />
          </div>

          <div class="field">
            <label for="speaker">Speaker</label>
            <input id="speaker" name="speaker" />
          </div>

          <div class="field">
            <label for="lecture_date">Lecture Date</label>
            <input id="lecture_date" name="lecture_date" type="date" required />
          </div>

          <div class="field">
            <label for="is_published">Published</label>
            <select id="is_published" name="is_published">
              <option value="1" selected>Yes</option>
              <option value="0">No</option>
            </select>
          </div>

          <div class="field full">
            <label for="description">Description</label>
            <textarea id="description" name="description"></textarea>
          </div>

          <div class="field full">
            <label for="cover_image">Cover Image (optional)</label>
            <input id="cover_image" name="cover_image" type="file" accept="image/*" />
            <div class="small-note">
              If empty, the system will try to generate a thumbnail automatically from the first PDF.
            </div>
            <div id="coverPreviewWrap" class="cover-preview-wrap">
              <img id="coverPreview" class="cover-preview" alt="Cover preview" />
            </div>
          </div>

          <div class="field full">
            <label>Lecture Files</label>
            <div class="files-box">
              <div id="filesContainer"></div>
              <button class="btn btn-secondary" type="button" id="addFileBtn">+ Add File</button>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-primary" type="submit">Save Lecture</button>
          <button class="btn btn-secondary" type="button" id="fillSampleBtn">Fill Sample</button>
        </div>
      </form>

      <div id="statusBox" class="status"></div>
    </div>

    <footer class="site-footer">
      <a href="/lecture-library/">Lecture Library</a>
    </footer>
  </div>

  <template id="fileRowTemplate">
    <div class="file-row">
      <div class="file-grid">
        <div class="field full">
          <label>Lecture File</label>
          <input
            class="lecture_file"
            type="file"
            accept=".pdf,.ppt,.pptx,.doc,.docx,application/pdf,application/vnd.ms-powerpoint,application/vnd.openxmlformats-officedocument.presentationml.presentation,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document"
          />
        </div>

        <div class="field">
          <label>Display Name (optional)</label>
          <input class="display_name" placeholder="Leave empty to use original file name" />
        </div>

        <div class="field">
          <label>Selected File</label>
          <div class="file-meta">No file selected.</div>
        </div>
      </div>

      <button type="button" class="btn btn-danger remove-file-btn">Remove File</button>
    </div>
  </template>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
    }

    const form = document.getElementById("lectureForm");
    const filesContainer = document.getElementById("filesContainer");
    const addFileBtn = document.getElementById("addFileBtn");
    const fillSampleBtn = document.getElementById("fillSampleBtn");
    const statusBox = document.getElementById("statusBox");
    const fileRowTemplate = document.getElementById("fileRowTemplate");
    const coverInput = document.getElementById("cover_image");
    const coverPreviewWrap = document.getElementById("coverPreviewWrap");
    const coverPreview = document.getElementById("coverPreview");

    function showStatus(message, type = "ok") {
      statusBox.className = "status " + type;
      statusBox.textContent = message;
    }

    function clearStatus() {
      statusBox.className = "status";
      statusBox.textContent = "";
    }

    function formatBytes(bytes) {
      const value = Number(bytes || 0);
      if (!value) return "0 B";
      const units = ["B", "KB", "MB", "GB"];
      let size = value;
      let unitIndex = 0;
      while (size >= 1024 && unitIndex < units.length - 1) {
        size /= 1024;
        unitIndex++;
      }
      return `${size.toFixed(size >= 10 || unitIndex === 0 ? 0 : 1)} ${units[unitIndex]}`;
    }

    function addFileRow() {
      const node = fileRowTemplate.content.cloneNode(true);
      const row = node.querySelector(".file-row");
      const fileInput = row.querySelector(".lecture_file");
      const metaBox = row.querySelector(".file-meta");

      fileInput.addEventListener("change", () => {
        const file = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
        if (!file) {
          metaBox.textContent = "No file selected.";
          return;
        }

        const type = file.name.includes(".") ? file.name.split(".").pop().toUpperCase() : "FILE";
        metaBox.textContent = `${file.name} • ${type} • ${formatBytes(file.size)}`;
      });

      row.querySelector(".remove-file-btn").addEventListener("click", () => {
        row.remove();
      });

      filesContainer.appendChild(node);
    }

    function getSelectedLectureFiles() {
      return Array.from(filesContainer.querySelectorAll(".file-row"))
        .map((row) => {
          const fileInput = row.querySelector(".lecture_file");
          const file = fileInput.files && fileInput.files[0] ? fileInput.files[0] : null;
          const displayName = row.querySelector(".display_name").value.trim();

          return { file, displayName };
        })
        .filter((item) => item.file);
    }

    function updateCoverPreview(file) {
      if (!file) {
        coverPreview.src = "";
        coverPreviewWrap.classList.remove("show");
        return;
      }

      const objectUrl = URL.createObjectURL(file);
      coverPreview.src = objectUrl;
      coverPreviewWrap.classList.add("show");
    }

    async function uploadCoverImage(file) {
      const formData = new FormData();
      formData.append("file", file);

      const response = await fetch("/api/upload-cover", {
        method: "POST",
        body: formData,
      });

      const data = await response.json();

      if (!response.ok || !data.ok) {
        throw new Error(data.error || "Failed to upload cover image.");
      }

      return data.file_url;
    }

    async function uploadLectureFile(file) {
      const formData = new FormData();
      formData.append("file", file);

      const response = await fetch("/api/upload-lecture-file", {
        method: "POST",
        body: formData,
      });

      const data = await response.json();

      if (!response.ok || !data.ok) {
        throw new Error(data.error || "Failed to upload lecture file.");
      }

      return data;
    }

    async function generatePdfThumbnailFile(pdfFile) {
      if (!window.pdfjsLib) {
        throw new Error("pdf.js failed to load.");
      }

      const arrayBuffer = await pdfFile.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const page = await pdf.getPage(1);

      const viewport = page.getViewport({ scale: 1.2 });
      const canvas = document.createElement("canvas");
      const context = canvas.getContext("2d");

      canvas.width = viewport.width;
      canvas.height = viewport.height;

      await page.render({
        canvasContext: context,
        viewport
      }).promise;

      const blob = await new Promise((resolve, reject) => {
        canvas.toBlob((result) => {
          if (result) resolve(result);
          else reject(new Error("Failed to create PDF thumbnail."));
        }, "image/jpeg", 0.85);
      });

      const baseName = pdfFile.name.replace(/\.[^.]+$/, "") || "lecture";
      return new File([blob], `${baseName}-thumb.jpg`, { type: "image/jpeg" });
    }

    addFileBtn.addEventListener("click", () => addFileRow());

    coverInput.addEventListener("change", () => {
      const file = coverInput.files && coverInput.files[0] ? coverInput.files[0] : null;
      updateCoverPreview(file);
      clearStatus();
    });

    fillSampleBtn.addEventListener("click", () => {
      document.getElementById("title").value = "Diabetes Update 2026";
      document.getElementById("speaker").value = "Dr. Ahmed";
      document.getElementById("lecture_date").value = "2026-03-29";
      document.getElementById("description").value = "Sample lecture used to test the first admin form and API.";
      document.getElementById("is_published").value = "1";
      clearStatus();
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearStatus();

      const title = document.getElementById("title").value.trim();
      const speaker = document.getElementById("speaker").value.trim();
      const lectureDate = document.getElementById("lecture_date").value;
      const description = document.getElementById("description").value.trim();
      const isPublished = document.getElementById("is_published").value === "1";
      const coverFile = coverInput.files && coverInput.files[0] ? coverInput.files[0] : null;
      const lectureFiles = getSelectedLectureFiles();

      if (!title) {
        showStatus("Title is required.", "error");
        return;
      }

      if (!lectureDate) {
        showStatus("Lecture date is required.", "error");
        return;
      }

      try {
        let coverImageUrl = "";

        if (coverFile) {
          showStatus("Uploading cover image...", "ok");
          coverImageUrl = await uploadCoverImage(coverFile);
        }

        const uploadedFiles = [];

        for (let i = 0; i < lectureFiles.length; i++) {
          const item = lectureFiles[i];
          showStatus(`Uploading lecture file ${i + 1} of ${lectureFiles.length}: ${item.file.name}`, "ok");

          const uploaded = await uploadLectureFile(item.file);

          uploadedFiles.push({
            file_name: item.displayName || uploaded.file_name,
            file_type: uploaded.file_type,
            file_url: uploaded.file_url,
            file_size: uploaded.file_size,
            thumbnail_url: uploaded.thumbnail_url || "",
          });
        }

        if (!coverImageUrl) {
          const firstPdf = lectureFiles.find((item) =>
            item.file && item.file.name.toLowerCase().endsWith(".pdf")
          );

          if (firstPdf) {
            try {
              showStatus("Generating thumbnail from first PDF...", "ok");
              const generatedThumbFile = await generatePdfThumbnailFile(firstPdf.file);
              coverImageUrl = await uploadCoverImage(generatedThumbFile);
            } catch (thumbError) {
              console.warn("PDF thumbnail generation failed:", thumbError);
            }
          }
        }

        showStatus("Saving lecture...", "ok");

        const payload = {
          title,
          speaker,
          lecture_date: lectureDate,
          description,
          cover_image_url: coverImageUrl,
          is_published: isPublished,
          files: uploadedFiles,
        };

        const res = await fetch("/api/lectures", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Failed to save lecture.");
        }

        showStatus(
          "Lecture saved successfully.\n\nSlug: " + data.item.slug + "\nID: " + data.item.id,
          "ok"
        );

        form.reset();
        filesContainer.innerHTML = "";
        addFileRow();
        updateCoverPreview(null);
      } catch (error) {
        showStatus(error.message || "Something went wrong.", "error");
      }
    });

    addFileRow();
  </script>
</body>
</html>
