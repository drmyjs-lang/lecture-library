<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تعديل المحاضرة</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#14213d;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#2563eb;
      --blue2:#1d4ed8;
      --red:#dc2626;
      --green:#16a34a;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Tahoma, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:980px;
      margin:40px auto;
      padding:0 16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }

    h1{
      margin:0 0 8px;
      font-size:30px;
    }

    .sub{
      color:var(--muted);
      margin-bottom:22px;
      font-size:15px;
    }

    .status{
      display:none;
      margin-bottom:16px;
      padding:14px 16px;
      border-radius:14px;
      font-size:15px;
    }

    .status.show{display:block}
    .status.ok{
      background:#dcfce7;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.err{
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }

    .loading{
      color:var(--muted);
      padding:8px 0 18px;
    }

    .grid{
      display:grid;
      gap:16px;
    }

    .grid-2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:16px;
    }

    label{
      display:block;
      font-size:14px;
      margin-bottom:8px;
      color:var(--text);
      font-weight:bold;
    }

    input[type="text"],
    input[type="date"],
    textarea,
    select{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      font-size:15px;
      font-family:inherit;
      outline:none;
      background:#fff;
    }

    input:focus,
    textarea:focus,
    select:focus{
      border-color:var(--blue);
    }

    textarea{
      min-height:150px;
      resize:vertical;
      line-height:1.8;
    }

    .box{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fafafa;
      padding:14px;
    }

    .box-title{
      font-weight:bold;
      margin-bottom:10px;
    }

    .cover-preview{
      width:100%;
      max-width:280px;
      border-radius:14px;
      border:1px solid var(--line);
      display:block;
      background:#fff;
    }

    .file-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      padding:12px 0;
      border-bottom:1px solid #ececec;
      flex-wrap:wrap;
    }

    .file-row:last-child{
      border-bottom:none;
    }

    .file-name{
      font-size:14px;
      word-break:break-word;
    }

    .actions,
    .file-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button,
    a.btn{
      border:none;
      border-radius:14px;
      padding:12px 18px;
      font-size:15px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-family:inherit;
    }

    .btn-primary{
      background:var(--blue);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--blue2);
    }

    .btn-light{
      background:#eef2ff;
      color:var(--blue);
    }

    .btn-danger{
      background:#fee2e2;
      color:var(--red);
    }

    .empty{
      color:var(--muted);
      font-size:14px;
    }

    .small{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
      word-break:break-word;
    }

    @media (max-width:760px){
      .grid-2{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>تعديل المحاضرة</h1>
      <div class="sub">تعديل البيانات الأساسية وإدارة الملفات الحالية.</div>

      <div id="status" class="status"></div>
      <div id="loading" class="loading">جاري تحميل البيانات...</div>

      <form id="editForm" style="display:none;">
        <div class="grid">
          <div>
            <label for="title">عنوان المحاضرة</label>
            <input id="title" name="title" type="text" required />
          </div>

          <div class="grid-2">
            <div>
              <label for="speaker">المتحدث</label>
              <input id="speaker" name="speaker" type="text" />
            </div>

            <div>
              <label for="lecture_date">تاريخ المحاضرة</label>
              <input id="lecture_date" name="lecture_date" type="date" required />
            </div>
          </div>

          <div>
            <label for="description">الوصف</label>
            <textarea id="description" name="description"></textarea>
          </div>

          <div class="grid-2">
            <div>
              <label for="cover_image_url">رابط صورة الغلاف</label>
              <input id="cover_image_url" name="cover_image_url" type="text" />
            </div>

            <div>
              <label for="is_published">الحالة</label>
              <select id="is_published" name="is_published">
                <option value="1">منشور</option>
                <option value="0">غير منشور</option>
              </select>
            </div>
          </div>

          <div class="box">
            <div class="box-title">معاينة الغلاف</div>
            <div id="coverPreviewBox" class="empty">لا توجد صورة غلاف.</div>
          </div>

          <div class="box">
            <div class="box-title">الملفات الحالية</div>
            <div id="filesBox" class="empty">لا توجد ملفات.</div>
          </div>
        </div>

        <div class="actions" style="margin-top:18px;">
          <button id="saveBtn" class="btn-primary" type="submit">حفظ التعديلات</button>
          <a class="btn btn-light" href="/admin/">العودة إلى لوحة الإدارة</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const statusBox = document.getElementById("status");
    const loadingEl = document.getElementById("loading");
    const form = document.getElementById("editForm");
    const saveBtn = document.getElementById("saveBtn");

    const titleEl = document.getElementById("title");
    const speakerEl = document.getElementById("speaker");
    const lectureDateEl = document.getElementById("lecture_date");
    const descriptionEl = document.getElementById("description");
    const coverImageUrlEl = document.getElementById("cover_image_url");
    const isPublishedEl = document.getElementById("is_published");

    const coverPreviewBox = document.getElementById("coverPreviewBox");
    const filesBox = document.getElementById("filesBox");

    const url = new URL(window.location.href);
    const lectureId = Number(url.searchParams.get("id"));

    function showStatus(message, type = "ok") {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`;
    }

    function hideStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderCover(url) {
      if (!url) {
        coverPreviewBox.innerHTML = `<div class="empty">لا توجد صورة غلاف.</div>`;
        return;
      }

      coverPreviewBox.innerHTML = `
        <img class="cover-preview" src="${escapeHtml(url)}" alt="Cover image" />
        <div class="small" style="margin-top:8px;">${escapeHtml(url)}</div>
      `;
    }

    function renderFiles(files) {
      if (!Array.isArray(files) || !files.length) {
        filesBox.innerHTML = `<div class="empty">لا توجد ملفات مرتبطة بهذه المحاضرة.</div>`;
        return;
      }

      filesBox.innerHTML = files.map((file) => `
        <div class="file-row">
          <div class="file-name">
            <strong>${escapeHtml(file.file_name || "بدون اسم")}</strong>
            ${file.file_type ? `(${escapeHtml(String(file.file_type).toUpperCase())})` : ""}
            <div class="small">${escapeHtml(file.file_url || "")}</div>
          </div>

          <div class="file-actions">
            <a class="btn btn-light" href="${escapeHtml(file.file_url || "#")}" target="_blank" rel="noopener">فتح</a>
            <button class="btn btn-danger" type="button" onclick="deleteFile(${Number(file.id)})">حذف الملف</button>
          </div>
        </div>
      `).join("");
    }

    async function loadLecture() {
      try {
        hideStatus();

        if (!Number.isInteger(lectureId) || lectureId <= 0) {
          throw new Error("رقم المحاضرة غير صالح.");
        }

        const res = await fetch(`/api/admin-get-lecture?id=${lectureId}`);
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.error || "تعذر تحميل بيانات المحاضرة.");
        }

        const item = data.item || {};

        titleEl.value = item.title || "";
        speakerEl.value = item.speaker || "";
        lectureDateEl.value = item.lecture_date || "";
        descriptionEl.value = item.description || "";
        coverImageUrlEl.value = item.cover_image_url || "";
        isPublishedEl.value = String(item.is_published ?? 1);

        renderCover(item.cover_image_url || "");
        renderFiles(item.files || []);

        loadingEl.style.display = "none";
        form.style.display = "block";
      } catch (err) {
        loadingEl.style.display = "none";
        showStatus(err.message || "حدث خطأ أثناء تحميل البيانات.", "err");
      }
    }

    async function deleteFile(id) {
      const ok = window.confirm("هل أنت متأكد من حذف هذا الملف؟");
      if (!ok) return;

      try {
        const res = await fetch("/api/admin-delete-file", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ id })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.error || "تعذر حذف الملف.");
        }

        showStatus("تم حذف الملف بنجاح.", "ok");
        await loadLecture();
      } catch (err) {
        showStatus(err.message || "حدث خطأ أثناء حذف الملف.", "err");
      }
    }

    async function saveLecture(event) {
      event.preventDefault();

      try {
        hideStatus();
        saveBtn.disabled = true;
        saveBtn.textContent = "جاري الحفظ...";

        const payload = {
          id: lectureId,
          title: titleEl.value,
          speaker: speakerEl.value,
          lecture_date: lectureDateEl.value,
          description: descriptionEl.value,
          cover_image_url: coverImageUrlEl.value,
          is_published: Number(isPublishedEl.value)
        };

        const res = await fetch("/api/admin-update-lecture", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.error || "تعذر حفظ التعديلات.");
        }

        showStatus("تم حفظ التعديلات بنجاح.", "ok");

        setTimeout(() => {
          window.location.href = "/admin/";
        }, 700);
      } catch (err) {
        showStatus(err.message || "حدث خطأ أثناء الحفظ.", "err");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "حفظ التعديلات";
      }
    }

    form.addEventListener("submit", saveLecture);
    window.deleteFile = deleteFile;

    loadLecture();
  </script>
</body>
</html>
