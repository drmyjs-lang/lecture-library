<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تعديل المحاضرة</title>
  <style>
    :root{
      --bg:#f3f6fb;
      --card:#ffffff;
      --text:#14213d;
      --muted:#6b7280;
      --line:#e5e7eb;
      --blue:#2563eb;
      --blue2:#1d4ed8;
      --red:#dc2626;
      --green:#16a34a;
      --shadow:0 10px 30px rgba(0,0,0,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Tahoma, Arial, sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    .wrap{
      max-width:950px;
      margin:40px auto;
      padding:0 16px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:24px;
    }

    h1{
      margin:0 0 8px;
      font-size:30px;
    }

    .sub{
      color:var(--muted);
      margin-bottom:22px;
      font-size:15px;
    }

    .status{
      display:none;
      margin-bottom:16px;
      padding:14px 16px;
      border-radius:14px;
      font-size:15px;
    }

    .status.show{display:block}
    .status.ok{
      background:#dcfce7;
      color:#166534;
      border:1px solid #bbf7d0;
    }
    .status.err{
      background:#fee2e2;
      color:#991b1b;
      border:1px solid #fecaca;
    }

    .grid{
      display:grid;
      gap:16px;
    }

    label{
      display:block;
      font-size:14px;
      margin-bottom:8px;
      color:var(--text);
      font-weight:bold;
    }

    input[type="text"],
    input[type="url"],
    textarea{
      width:100%;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px 14px;
      font-size:15px;
      font-family:inherit;
      outline:none;
      background:#fff;
    }

    input[type="text"]:focus,
    input[type="url"]:focus,
    textarea:focus{
      border-color:var(--blue);
    }

    input[type="file"]{
      width:100%;
      border:1px dashed var(--line);
      border-radius:14px;
      padding:14px;
      background:#fff;
      font-family:inherit;
    }

    textarea{
      min-height:160px;
      resize:vertical;
      line-height:1.8;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:10px;
    }

    button, a.btn{
      border:none;
      border-radius:14px;
      padding:12px 18px;
      font-size:15px;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      font-family:inherit;
    }

    .btn-primary{
      background:var(--blue);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--blue2);
    }

    .btn-light{
      background:#eef2ff;
      color:var(--blue);
    }

    .loading{
      color:var(--muted);
      padding:8px 0 18px;
    }

    .box{
      border:1px solid var(--line);
      border-radius:16px;
      background:#fafafa;
      padding:14px;
    }

    .box-title{
      font-weight:bold;
      margin-bottom:10px;
    }

    .preview-img{
      width:100%;
      max-width:280px;
      border-radius:14px;
      border:1px solid var(--line);
      display:block;
      background:#fff;
    }

    .small{
      color:var(--muted);
      font-size:13px;
      line-height:1.8;
    }

    .check{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:10px;
      font-size:14px;
      color:var(--text);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>تعديل المحاضرة</h1>
      <div class="sub">يمكنك تعديل البيانات أو رفع ملف وصورة جديدين من الكمبيوتر.</div>

      <div id="status" class="status"></div>
      <div id="loading" class="loading">جاري تحميل البيانات...</div>

      <form id="editForm" style="display:none;">
        <div class="grid">
          <div>
            <label for="title">عنوان المحاضرة</label>
            <input id="title" name="title" type="text" required />
          </div>

          <div>
            <label for="lecture_date">تاريخ المحاضرة</label>
            <input id="lecture_date" name="lecture_date" type="text" placeholder="مثال: 2026-04-07" />
          </div>

          <div>
            <label for="description">الوصف</label>
            <textarea id="description" name="description" placeholder="اكتب وصف المحاضرة هنا"></textarea>
          </div>

          <div class="box">
            <div class="box-title">الملف الحالي</div>
            <div id="currentFileBox" class="small">لا يوجد ملف حالي.</div>

            <label for="lecture_file" style="margin-top:14px;">استبدال الملف من الكمبيوتر</label>
            <input
              id="lecture_file"
              name="lecture_file"
              type="file"
              accept=".pdf,.ppt,.pptx,.doc,.docx"
            />

            <label class="check">
              <input id="remove_file" name="remove_file" type="checkbox" />
              إزالة ربط الملف الحالي من هذه المحاضرة
            </label>
          </div>

          <div class="box">
            <div class="box-title">صورة الغلاف الحالية</div>
            <div id="currentCoverBox" class="small">لا توجد صورة غلاف حالية.</div>

            <label for="cover_file" style="margin-top:14px;">استبدال صورة الغلاف من الكمبيوتر</label>
            <input
              id="cover_file"
              name="cover_file"
              type="file"
              accept="image/*"
            />

            <label class="check">
              <input id="remove_cover" name="remove_cover" type="checkbox" />
              إزالة ربط صورة الغلاف الحالية من هذه المحاضرة
            </label>
          </div>
        </div>

        <div class="actions">
          <button id="saveBtn" class="btn-primary" type="submit">حفظ التعديلات</button>
          <a class="btn btn-light" href="/admin/">العودة إلى لوحة الإدارة</a>
        </div>
      </form>
    </div>
  </div>

  <script>
    const statusBox = document.getElementById("status");
    const loadingEl = document.getElementById("loading");
    const form = document.getElementById("editForm");
    const saveBtn = document.getElementById("saveBtn");

    const titleEl = document.getElementById("title");
    const lectureDateEl = document.getElementById("lecture_date");
    const descriptionEl = document.getElementById("description");

    const lectureFileEl = document.getElementById("lecture_file");
    const coverFileEl = document.getElementById("cover_file");

    const removeFileEl = document.getElementById("remove_file");
    const removeCoverEl = document.getElementById("remove_cover");

    const currentFileBox = document.getElementById("currentFileBox");
    const currentCoverBox = document.getElementById("currentCoverBox");

    const url = new URL(window.location.href);
    const lectureId = Number(url.searchParams.get("id"));

    let currentFileUrl = "";
    let currentCoverUrl = "";

    function showStatus(message, type = "ok") {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`;
    }

    function hideStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderCurrentFile(url) {
      if (!url) {
        currentFileBox.innerHTML = `<div class="small">لا يوجد ملف حالي.</div>`;
        return;
      }

      currentFileBox.innerHTML = `
        <a href="${escapeHtml(url)}" target="_blank" rel="noopener">فتح الملف الحالي</a>
        <div class="small" style="margin-top:8px;">${escapeHtml(url)}</div>
      `;
    }

    function renderCurrentCover(url) {
      if (!url) {
        currentCoverBox.innerHTML = `<div class="small">لا توجد صورة غلاف حالية.</div>`;
        return;
      }

      currentCoverBox.innerHTML = `
        <img class="preview-img" src="${escapeHtml(url)}" alt="Cover image" />
        <div class="small" style="margin-top:8px;">${escapeHtml(url)}</div>
      `;
    }

    async function loadLecture() {
      try {
        hideStatus();

        if (!Number.isInteger(lectureId) || lectureId <= 0) {
          throw new Error("رقم المحاضرة غير صالح.");
        }

        const res = await fetch(`/api/admin-get-lecture?id=${lectureId}`);
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.error || "تعذر تحميل بيانات المحاضرة.");
        }

        const item = data.item || {};

        titleEl.value = item.title || "";
        lectureDateEl.value = item.lecture_date || "";
        descriptionEl.value = item.description || "";

        currentFileUrl = item.file_url || "";
        currentCoverUrl = item.cover_image || "";

        renderCurrentFile(currentFileUrl);
        renderCurrentCover(currentCoverUrl);

        loadingEl.style.display = "none";
        form.style.display = "block";
      } catch (err) {
        loadingEl.style.display = "none";
        showStatus(err.message || "حدث خطأ أثناء تحميل البيانات.", "err");
      }
    }

    async function saveLecture(event) {
      event.preventDefault();

      try {
        hideStatus();
        saveBtn.disabled = true;
        saveBtn.textContent = "جاري الحفظ...";

        const formData = new FormData();
        formData.append("id", String(lectureId));
        formData.append("title", titleEl.value);
        formData.append("lecture_date", lectureDateEl.value);
        formData.append("description", descriptionEl.value);
        formData.append("existing_file_url", currentFileUrl);
        formData.append("existing_cover_image", currentCoverUrl);
        formData.append("remove_file", removeFileEl.checked ? "1" : "0");
        formData.append("remove_cover", removeCoverEl.checked ? "1" : "0");

        if (lectureFileEl.files && lectureFileEl.files[0]) {
          formData.append("lecture_file", lectureFileEl.files[0]);
        }

        if (coverFileEl.files && coverFileEl.files[0]) {
          formData.append("cover_file", coverFileEl.files[0]);
        }

        const res = await fetch("/api/admin-update-lecture", {
          method: "POST",
          body: formData
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.error || "تعذر حفظ التعديلات.");
        }

        showStatus("تم حفظ التعديلات بنجاح.", "ok");

        setTimeout(() => {
          window.location.href = "/admin/";
        }, 700);
      } catch (err) {
        showStatus(err.message || "حدث خطأ أثناء الحفظ.", "err");
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = "حفظ التعديلات";
      }
    }

    form.addEventListener("submit", saveLecture);
    loadLecture();
  </script>
</body>
</html>
