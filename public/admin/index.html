<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة إدارة المحاضرات</title>
  <meta name="theme-color" content="#0d6fb8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #eef5ff;
      --bg-soft: #f8fbff;
      --card: rgba(255, 255, 255, 0.88);
      --card-solid: #ffffff;
      --text: #10243e;
      --muted: #5f738d;
      --line: rgba(13, 111, 184, 0.14);
      --blue: #0d6fb8;
      --blue-dark: #084a86;
      --blue-soft: #3ca3d8;
      --blue-pale: #dff1ff;
      --success-bg: #ecfdf3;
      --success-text: #0f8a4b;
      --warn-bg: #fff7ed;
      --warn-text: #c46a12;
      --danger-bg: #fff1f2;
      --danger-text: #c92a4b;
      --shadow-lg: 0 28px 70px rgba(11, 64, 122, 0.14);
      --shadow-md: 0 18px 40px rgba(15, 78, 145, 0.1);
      --shadow-sm: 0 10px 24px rgba(17, 72, 128, 0.08);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --transition: 0.22s ease;
      --font-stack: "Manrope", "IBM Plex Sans Arabic", sans-serif;
      --max: 1280px;
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:var(--font-stack);
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(60, 163, 216, 0.18), transparent 28%),
        radial-gradient(circle at bottom left, rgba(13, 111, 184, 0.1), transparent 32%),
        linear-gradient(180deg, #f5faff 0%, #edf5ff 52%, #eaf2fc 100%);
      min-height:100vh;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 18px 60px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      background: rgba(255,255,255,0.66);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.62);
      box-shadow:var(--shadow-sm);
      border-radius:var(--radius-xl);
      padding:30px;
      display:grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap:28px;
      align-items:center;
      margin-bottom:26px;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:auto -90px -120px auto;
      width:280px;
      height:280px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(60,163,216,0.22), transparent 62%);
      pointer-events:none;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:-80px auto auto -80px;
      width:220px;
      height:220px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(13,111,184,0.08), transparent 65%);
      pointer-events:none;
    }

    .hero-copy{
      position:relative;
      z-index:1;
    }

    .hero-title{
      margin:0;
      font-size:clamp(26px, 3.2vw, 40px);
      line-height:1.12;
      letter-spacing:-0.02em;
      font-weight:800;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:24px;
    }

    .btn{
      border:none;
      border-radius:18px;
      padding:14px 20px;
      font-size:14px;
      font-weight:800;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:transform var(--transition), box-shadow var(--transition), background var(--transition), border-color var(--transition);
      font-family:inherit;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--blue), var(--blue-dark));
      color:#fff;
      box-shadow:0 18px 34px rgba(13,111,184,0.26);
    }

    .btn-secondary{
      background:rgba(13,111,184,0.08);
      color:var(--blue-dark);
      border:1px solid rgba(13,111,184,0.12);
    }

    .btn-danger{
      background:rgba(201,42,75,0.08);
      color:#b12143;
      border:1px solid rgba(201,42,75,0.12);
    }

    .btn-success{
      background:rgba(15,138,75,0.08);
      color:#0f8a4b;
      border:1px solid rgba(15,138,75,0.12);
    }

    .hero-brand{
      position:relative;
      z-index:1;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .hero-brand-card{
      width:100%;
      max-width:520px;
      min-height:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
      border:none;
      border-radius:0;
      padding:0;
      box-shadow:none;
      backdrop-filter:none;
      -webkit-backdrop-filter:none;
    }

    .hero-logo{
      display:block;
      width:100%;
      max-height:220px;
      object-fit:contain;
      border-radius:0;
      background:transparent;
      padding:0;
      box-shadow:none;
    }

    .toolbar{
      background:var(--card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border:1px solid rgba(255,255,255,0.7);
      border-radius:var(--radius-xl);
      box-shadow:var(--shadow-sm);
      padding:16px;
      display:grid;
      grid-template-columns: 1fr auto auto auto;
      gap:14px;
      align-items:center;
      margin-bottom:28px;
    }

    .search-wrap{
      position:relative;
    }

    .search-wrap svg{
      position:absolute;
      right:16px;
      top:50%;
      transform:translateY(-50%);
      width:18px;
      height:18px;
      color:var(--muted);
      pointer-events:none;
    }

    .search{
      width:100%;
      min-height:54px;
      border-radius:16px;
      border:1px solid rgba(13,111,184,0.1);
      background:#ffffff;
      padding:0 46px 0 18px;
      font-size:15px;
      outline:none;
      color:var(--text);
      box-shadow:0 6px 16px rgba(12, 78, 140, 0.04);
      font-family:inherit;
      transition:border-color var(--transition), box-shadow var(--transition);
    }

    .search:focus{
      border-color:rgba(13,111,184,0.35);
      box-shadow:0 0 0 4px rgba(13,111,184,0.1);
    }

    .stat{
      min-height:54px;
      border-radius:16px;
      border:1px solid rgba(13,111,184,0.1);
      background:#ffffff;
      padding:0 16px;
      font-size:14px;
      color:var(--blue-dark);
      display:flex;
      align-items:center;
      white-space:nowrap;
      font-weight:800;
      box-shadow:0 6px 16px rgba(12, 78, 140, 0.04);
    }

    .status{
      display:none;
      margin-bottom:18px;
      padding:16px 18px;
      border-radius:20px;
      font-size:14px;
      font-weight:700;
    }

    .status.show{
      display:block;
    }

    .status.ok{
      background:var(--success-bg);
      color:var(--success-text);
      border:1px solid rgba(15,138,75,0.14);
      box-shadow:0 14px 30px rgba(15,138,75,0.08);
    }

    .status.err{
      background:var(--danger-bg);
      color:var(--danger-text);
      border:1px solid rgba(201,42,75,0.14);
      box-shadow:0 14px 30px rgba(201,42,75,0.08);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:22px;
    }

    .card{
      display:flex;
      flex-direction:column;
      min-height:100%;
      background:var(--card-solid);
      border:1px solid rgba(13,111,184,0.08);
      border-radius:var(--radius-lg);
      overflow:hidden;
      box-shadow:var(--shadow-sm);
      transition:transform var(--transition), box-shadow var(--transition);
    }

    .card:hover{
      transform:translateY(-3px);
      box-shadow:var(--shadow-md);
    }

    .cover{
      position:relative;
      aspect-ratio:16 / 9;
      background: linear-gradient(135deg, rgba(8,74,134,0.88), rgba(60,163,216,0.86)), #e9f5ff;
      background-size: cover;
      background-position: center;
    }

    .cover::after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(180deg, rgba(255,255,255,0.03), rgba(0,0,0,0.08));
      pointer-events:none;
    }

    .card-body{
      padding:20px;
      display:flex;
      flex-direction:column;
      gap:14px;
      flex:1;
    }

    .meta-line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:13px;
    }

    .speaker{
      font-weight:700;
      color:var(--blue-dark);
    }

    .title{
      margin:0;
      font-size:24px;
      letter-spacing:-0.03em;
      line-height:1.2;
      font-weight:800;
    }

    .desc{
      color:var(--muted);
      line-height:1.9;
      font-size:14px;
      display:-webkit-box;
      -webkit-line-clamp:4;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:106px;
    }

    .files-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:auto;
      padding-top:14px;
      border-top:1px solid rgba(13,111,184,0.08);
    }

    .files-title{
      font-size:13px;
      font-weight:800;
      color:var(--text);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:6px 9px;
      border-radius:10px;
      background:#ffffff;
      color:var(--blue);
      font-size:11px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:0.03em;
      box-shadow:0 8px 16px rgba(14, 81, 145, 0.08);
    }

    .files-list{
      display:grid;
      gap:8px;
    }

    .file-link{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:11px 13px;
      background:#f7fbff;
      border:1px solid rgba(13,111,184,0.08);
      border-radius:14px;
      transition:background var(--transition), border-color var(--transition), transform var(--transition);
    }

    .file-link:hover{
      background:#fff;
      border-color:rgba(13,111,184,0.20);
      transform:translateY(-1px);
    }

    .file-text{
      min-width:0;
    }

    .file-name{
      font-size:13px;
      font-weight:700;
      line-height:1.5;
      color:var(--text);
      word-break:break-word;
    }

    .file-sub{
      margin-top:2px;
      color:var(--muted);
      font-size:12px;
    }

    .card-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      padding-top:10px;
    }

    .loading,
    .empty{
      background:rgba(255,255,255,0.72);
      border:1px solid rgba(13,111,184,0.08);
      border-radius:22px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.96);
      padding:32px 22px;
      text-align:center;
      color:var(--muted);
      font-size:15px;
      font-weight:700;
    }

    .footer-note{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      padding-top:30px;
    }

    @media (max-width: 1120px){
      .hero{
        grid-template-columns:1fr;
      }

      .hero-brand{
        justify-content:flex-start;
      }

      .grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 860px){
      .toolbar{
        grid-template-columns:1fr;
      }

      .hero{
        padding:22px;
      }

      .hero-title{
        font-size:32px;
      }

      .stat,
      .search{
        min-height:50px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-copy">
        <h1 class="hero-title">لوحة إدارة المحاضرات</h1>

        <div class="hero-actions">
          <a class="btn btn-primary" href="/admin/lecture-upload/">رفع محاضرة جديدة</a>
          <a class="btn btn-secondary" href="/lecture-library/" target="_blank" rel="noopener">فتح المكتبة العامة</a>
          <button id="logoutBtn" class="btn btn-danger" type="button">تسجيل الخروج</button>
        </div>
      </div>

      <div class="hero-brand">
        <div class="hero-brand-card">
          <img
            class="hero-logo"
            src="/assets/logo.png"
            alt="Alahsa Health Cluster Logo"
            onerror="this.style.display='none';"
          />
        </div>
      </div>
    </section>

    <div id="status" class="status"></div>

    <section class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20L17 17"></path>
        </svg>
        <input
          id="searchInput"
          class="search"
          type="text"
          placeholder="ابحث بالعنوان أو الوصف أو المتحدث أو اسم الملف..."
        />
      </div>

      <div id="countBadge" class="stat">إجمالي المحاضرات: 0</div>
      <div id="filteredBadge" class="stat">المعروض: 0</div>
      <div id="filesBadge" class="stat">إجمالي الملفات: 0</div>
    </section>

    <div id="loading" class="loading">جاري تحميل المحاضرات...</div>
    <div id="empty" class="empty" style="display:none;">لا توجد محاضرات حاليًا.</div>
    <div id="grid" class="grid"></div>

    <div class="footer-note">
      © 2026 Alahsa Health Cluster - Our MedTalks. All rights reserved.
      
           Developed by Dr.Mohammed Al Saleem
    </div>
  </div>

  <script>
    const statusBox = document.getElementById("status");
    const loadingEl = document.getElementById("loading");
    const emptyEl = document.getElementById("empty");
    const gridEl = document.getElementById("grid");
    const searchInput = document.getElementById("searchInput");
    const logoutBtn = document.getElementById("logoutBtn");

    const countBadge = document.getElementById("countBadge");
    const filteredBadge = document.getElementById("filteredBadge");
    const filesBadge = document.getElementById("filesBadge");

    let allLectures = [];

    function showStatus(message, type = "ok") {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`;
    }

    function hideStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clean(value) {
      return String(value ?? "").trim();
    }

    function formatLectureDate(dateString) {
      if (!dateString) return "No date";

      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;

      return new Intl.DateTimeFormat("en", {
        month: "short",
        day: "numeric",
        year: "numeric"
      }).format(date);
    }

    function normalizeFile(file) {
      return {
        id: Number(file?.id || 0),
        file_name: clean(file?.file_name),
        file_type: clean(file?.file_type).toUpperCase() || "FILE",
        file_url: clean(file?.file_url),
        thumbnail_url: clean(file?.thumbnail_url),
        sort_order: Number(file?.sort_order || 0)
      };
    }

    function normalizeLecture(item) {
      const files = Array.isArray(item?.files)
        ? item.files.map(normalizeFile).filter(file => file.file_url)
        : [];

      return {
        id: Number(item?.id || 0),
        title: clean(item?.title) || "Untitled Lecture",
        description: clean(item?.description),
        speaker: clean(item?.speaker) || "Unknown speaker",
        lecture_date: clean(item?.lecture_date),
        cover_image_url: clean(item?.cover_image_url),
        files
      };
    }

    function lectureSearchText(lecture) {
      return [
        lecture.title,
        lecture.description,
        lecture.speaker,
        lecture.lecture_date,
        ...lecture.files.map(file => `${file.file_name} ${file.file_type}`)
      ].join(" ").toLowerCase();
    }

    function sortLectures(items) {
      return [...items].sort((a, b) => {
        const aTime = new Date(a.lecture_date || 0).getTime();
        const bTime = new Date(b.lecture_date || 0).getTime();
        return bTime - aTime;
      });
    }

    function updateStats(filtered) {
      const totalFiles = allLectures.reduce((sum, lecture) => sum + lecture.files.length, 0);
      const filteredFiles = filtered.reduce((sum, lecture) => sum + lecture.files.length, 0);

      countBadge.textContent = `إجمالي المحاضرات: ${allLectures.length}`;
      filteredBadge.textContent = `المعروض: ${filtered.length}`;
      filesBadge.textContent = `إجمالي الملفات: ${filteredFiles}/${totalFiles}`;
    }

    function renderFiles(files) {
      if (!files.length) {
        return `
          <div class="files-list">
            <div class="file-link">
              <div class="file-text">
                <div class="file-name">لا توجد ملفات</div>
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="files-list">
          ${files.map((file) => `
            <a class="file-link" href="${escapeHtml(file.file_url)}" target="_blank" rel="noopener">
              <div class="file-text">
                <div class="file-name">${escapeHtml(file.file_name || "Open file")}</div>
                <div class="file-sub">${escapeHtml(file.file_type || "FILE")}</div>
              </div>
              <span class="badge">${escapeHtml(file.file_type || "FILE")}</span>
            </a>
          `).join("")}
        </div>
      `;
    }

    function renderLectures() {
      const query = searchInput.value.trim().toLowerCase();

      const filtered = sortLectures(
        allLectures.filter((lecture) => {
          if (!query) return true;
          return lectureSearchText(lecture).includes(query);
        })
      );

      updateStats(filtered);
      gridEl.innerHTML = "";

      if (!filtered.length) {
        emptyEl.style.display = "block";
        return;
      }

      emptyEl.style.display = "none";

      for (const lecture of filtered) {
        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
          <div
            class="cover"
            style="background-image:url('${String(lecture.cover_image_url || "").replaceAll("'", "%27")}')"
          ></div>

          <div class="card-body">
            <div class="meta-line">
              <span class="speaker">${escapeHtml(lecture.speaker)}</span>
              <span>${escapeHtml(formatLectureDate(lecture.lecture_date))}</span>
            </div>

            <h3 class="title">${escapeHtml(lecture.title)}</h3>

            <div class="desc">${escapeHtml(lecture.description || "لا يوجد وصف.")}</div>

            <div class="files-head">
              <div class="files-title">الملفات (${lecture.files.length})</div>
              ${lecture.files[0] ? `<span class="badge">${escapeHtml(lecture.files[0].file_type || "FILE")}</span>` : ""}
            </div>

            ${renderFiles(lecture.files)}

            <div class="card-actions">
              <a class="btn btn-secondary" href="/admin/edit-lecture/?id=${Number(lecture.id)}">تعديل</a>
              <button class="btn btn-danger" type="button" onclick="deleteLecture(${Number(lecture.id)})">حذف</button>
            </div>
          </div>
        `;

        gridEl.appendChild(card);
      }
    }

    async function loadLectures() {
      try {
        hideStatus();
        loadingEl.style.display = "block";
        emptyEl.style.display = "none";
        gridEl.innerHTML = "";

        const res = await fetch("/api/lectures?published=all");
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.error || "تعذر تحميل المحاضرات.");
        }

        allLectures = Array.isArray(data.items)
          ? data.items.map(normalizeLecture)
          : [];

        loadingEl.style.display = "none";
        renderLectures();
      } catch (error) {
        loadingEl.style.display = "none";
        emptyEl.style.display = "block";
        emptyEl.textContent = error.message || "حدث خطأ أثناء تحميل المحاضرات.";
      }
    }

    async function deleteLecture(id) {
      const ok = window.confirm("هل أنت متأكد من حذف هذه المحاضرة؟");
      if (!ok) return;

      try {
        const res = await fetch("/api/admin-delete-lecture", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ id })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.error || "تعذر حذف المحاضرة.");
        }

        allLectures = allLectures.filter(item => Number(item.id) !== Number(id));
        renderLectures();
        showStatus("تم حذف المحاضرة بنجاح.", "ok");
      } catch (error) {
        showStatus(error.message || "حدث خطأ أثناء حذف المحاضرة.", "err");
      }
    }

    async function logout() {
      try {
        const res = await fetch("/api/admin-logout", {
          method: "POST"
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.error || "تعذر تسجيل الخروج.");
        }

        window.location.href = "/admin/login/";
      } catch (error) {
        showStatus(error.message || "حدث خطأ أثناء تسجيل الخروج.", "err");
      }
    }

    searchInput.addEventListener("input", renderLectures);
    logoutBtn.addEventListener("click", logout);

    window.deleteLecture = deleteLecture;

    loadLectures();
  </script>
</body>
</html>
