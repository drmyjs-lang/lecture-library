<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة إدارة مكتبة المحاضرات</title>
  <meta name="theme-color" content="#2563eb" />
  <style>
    :root{
      --bg: #f5f7fb;
      --card: rgba(255,255,255,0.86);
      --card-solid: #ffffff;
      --text: #14213d;
      --muted: #667085;
      --line: rgba(15, 23, 42, 0.08);
      --blue: #2563eb;
      --blue-2: #1d4ed8;
      --blue-soft: #dbeafe;
      --blue-tint: #eff6ff;
      --red: #dc2626;
      --red-soft: #fee2e2;
      --green: #16a34a;
      --green-soft: #dcfce7;
      --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.06);
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Tahoma, Arial, sans-serif;
      --max: 1280px;
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:var(--font-stack);
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(37,99,235,0.08), transparent 26%),
        radial-gradient(circle at top right, rgba(37,99,235,0.06), transparent 22%),
        linear-gradient(180deg, #f8fbff 0%, #f5f7fb 100%);
      min-height:100vh;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 18px 60px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      background:linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.78));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border:1px solid rgba(255,255,255,0.72);
      box-shadow:var(--shadow);
      border-radius:36px;
      padding:30px;
      display:grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap:28px;
      align-items:center;
      margin-bottom:26px;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:auto -90px -120px auto;
      width:280px;
      height:280px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(37,99,235,0.14), transparent 65%);
      pointer-events:none;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:-80px auto auto -80px;
      width:220px;
      height:220px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(37,99,235,0.08), transparent 65%);
      pointer-events:none;
    }

    .hero-copy{
      position:relative;
      z-index:1;
    }

    .hero-title{
      margin:0;
      font-size:clamp(30px, 5vw, 54px);
      line-height:1.04;
      letter-spacing:-0.03em;
      font-weight:800;
    }

    .hero-sub{
      margin:14px 0 0;
      font-size:17px;
      color:var(--muted);
      line-height:1.9;
      max-width:720px;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:24px;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:13px 18px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:transform .16s ease, box-shadow .16s ease, background .16s ease, border-color .16s ease;
      font-family:inherit;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn-primary{
      background:linear-gradient(180deg, var(--blue), var(--blue-2));
      color:#fff;
      box-shadow:0 10px 24px rgba(37,99,235,0.24);
    }

    .btn-secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
    }

    .btn-danger{
      background:var(--red-soft);
      color:var(--red);
      border:1px solid rgba(220,38,38,0.08);
      box-shadow:var(--shadow-soft);
    }

    .btn-success{
      background:var(--green-soft);
      color:var(--green);
      border:1px solid rgba(22,163,74,0.08);
      box-shadow:var(--shadow-soft);
    }

    .hero-brand{
      position:relative;
      z-index:1;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .hero-brand-card{
      width:100%;
      max-width:430px;
      min-height:240px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,0.72);
      border:1px solid rgba(255,255,255,0.82);
      border-radius:30px;
      padding:22px;
      box-shadow:var(--shadow-soft);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .hero-logo{
      display:block;
      width:100%;
      max-height:220px;
      object-fit:contain;
      border-radius:18px;
      background:transparent;
      padding:0;
    }

    .toolbar{
      background:rgba(255,255,255,0.74);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border:1px solid rgba(255,255,255,0.78);
      border-radius:28px;
      box-shadow:var(--shadow-soft);
      padding:16px;
      display:grid;
      grid-template-columns: 1fr auto auto auto;
      gap:14px;
      align-items:center;
      margin-bottom:28px;
    }

    .search-wrap{
      position:relative;
    }

    .search-wrap svg{
      position:absolute;
      right:16px;
      top:50%;
      transform:translateY(-50%);
      width:18px;
      height:18px;
      color:#94a3b8;
      pointer-events:none;
    }

    .search{
      width:100%;
      min-height:54px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.92);
      padding:0 46px 0 18px;
      font-size:16px;
      outline:none;
      color:var(--text);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.5);
      font-family:inherit;
    }

    .search:focus{
      border-color:rgba(37,99,235,0.35);
      box-shadow:0 0 0 4px rgba(37,99,235,0.10);
    }

    .stat{
      min-height:54px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.92);
      padding:0 16px;
      font-size:15px;
      color:var(--blue);
      display:flex;
      align-items:center;
      white-space:nowrap;
      font-weight:800;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .status{
      display:none;
      margin-bottom:18px;
      padding:16px 18px;
      border-radius:20px;
      font-size:15px;
      box-shadow:var(--shadow-soft);
      background:rgba(255,255,255,0.82);
      border:1px solid rgba(255,255,255,0.76);
    }

    .status.show{
      display:block;
    }

    .status.ok{
      background:var(--green-soft);
      color:#166534;
      border-color:rgba(22,163,74,0.08);
    }

    .status.err{
      background:var(--red-soft);
      color:#991b1b;
      border-color:rgba(220,38,38,0.08);
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:20px;
    }

    .card{
      display:flex;
      flex-direction:column;
      min-height:100%;
      background:var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border:1px solid rgba(255,255,255,0.78);
      border-radius:28px;
      overflow:hidden;
      box-shadow:var(--shadow-soft);
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .card:hover{
      transform:translateY(-3px);
      box-shadow:0 18px 40px rgba(15, 23, 42, 0.10);
    }

    .cover{
      position:relative;
      aspect-ratio:16 / 9;
      background:#f8fafc center/cover no-repeat;
      border-bottom:1px solid rgba(15, 23, 42, 0.06);
    }

    .cover::after{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:55%;
      background:linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.12));
      pointer-events:none;
    }

    .card-body{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      flex:1;
    }

    .meta-line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:14px;
    }

    .speaker{
      font-weight:700;
      color:var(--blue);
    }

    .title{
      margin:0;
      font-size:30px;
      letter-spacing:-0.03em;
      line-height:1.08;
      font-weight:800;
    }

    .desc{
      color:var(--muted);
      line-height:1.9;
      font-size:15px;
      display:-webkit-box;
      -webkit-line-clamp:4;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:108px;
    }

    .files-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:auto;
      padding-top:6px;
    }

    .files-title{
      font-size:14px;
      font-weight:800;
      color:var(--text);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      background:var(--blue-tint);
      color:var(--blue);
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:0.03em;
      border:1px solid rgba(37,99,235,0.10);
    }

    .files-list{
      display:grid;
      gap:10px;
    }

    .file-link{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      background:rgba(255,255,255,0.8);
      border:1px solid rgba(15, 23, 42, 0.07);
      border-radius:18px;
      transition:background .15s ease, border-color .15s ease, transform .15s ease;
    }

    .file-link:hover{
      background:#fff;
      border-color:rgba(37,99,235,0.20);
      transform:translateY(-1px);
    }

    .file-text{
      min-width:0;
    }

    .file-name{
      font-size:15px;
      font-weight:700;
      line-height:1.5;
      color:var(--text);
      word-break:break-word;
    }

    .file-sub{
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
    }

    .card-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      padding-top:10px;
    }

    .loading,
    .empty{
      background:rgba(255,255,255,0.74);
      border:1px solid rgba(255,255,255,0.78);
      border-radius:28px;
      box-shadow:var(--shadow-soft);
      padding:32px 22px;
      text-align:center;
      color:var(--muted);
      font-size:16px;
    }

    .footer-note{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      padding-top:30px;
    }

    @media (max-width: 1120px){
      .hero{
        grid-template-columns:1fr;
      }

      .hero-brand{
        justify-content:flex-start;
      }

      .grid{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 860px){
      .toolbar{
        grid-template-columns:1fr;
      }

      .hero{
        padding:22px;
      }

      .hero-title{
        font-size:40px;
      }

      .stat,
      .search{
        min-height:50px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-copy">
        <h1 class="hero-title">لوحة إدارة مكتبة المحاضرات</h1>
        <p class="hero-sub">إدارة المحاضرات والملفات والبحث والتعديل والحذف بنفس الهوية البصرية للمكتبة العامة.</p>

        <div class="hero-actions">
          <a class="btn btn-primary" href="/admin/lecture-upload/">رفع محاضرة جديدة</a>
          <a class="btn btn-secondary" href="/lecture-library/" target="_blank" rel="noopener">فتح المكتبة العامة</a>
          <button id="logoutBtn" class="btn btn-danger" type="button">تسجيل الخروج</button>
        </div>
      </div>

      <div class="hero-brand">
        <div class="hero-brand-card">
          <img
            class="hero-logo"
            src="/assets/alahsa-health-cluster-logo.jpg.jpg"
            alt="Alahsa Health Cluster Logo"
            onerror="this.style.display='none';"
          />
        </div>
      </div>
    </section>

    <div id="status" class="status"></div>

    <section class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20L17 17"></path>
        </svg>
        <input
          id="searchInput"
          class="search"
          type="text"
          placeholder="ابحث بالعنوان أو الوصف أو المتحدث أو اسم الملف..."
        />
      </div>

      <div id="countBadge" class="stat">إجمالي المحاضرات: 0</div>
      <div id="filteredBadge" class="stat">المعروض: 0</div>
      <div id="filesBadge" class="stat">إجمالي الملفات: 0</div>
    </section>

    <div id="loading" class="loading">جاري تحميل المحاضرات...</div>
    <div id="empty" class="empty" style="display:none;">لا توجد محاضرات حاليًا.</div>
    <div id="grid" class="grid"></div>

    <div class="footer-note">
      Powered by Lecture Library Admin
    </div>
  </div>

  <script>
    const statusBox = document.getElementById("status");
    const loadingEl = document.getElementById("loading");
    const emptyEl = document.getElementById("empty");
    const gridEl = document.getElementById("grid");
    const searchInput = document.getElementById("searchInput");
    const logoutBtn = document.getElementById("logoutBtn");

    const countBadge = document.getElementById("countBadge");
    const filteredBadge = document.getElementById("filteredBadge");
    const filesBadge = document.getElementById("filesBadge");

    let allLectures = [];

    function showStatus(message, type = "ok") {
      statusBox.textContent = message;
      statusBox.className = `status show ${type}`;
    }

    function hideStatus() {
      statusBox.textContent = "";
      statusBox.className = "status";
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clean(value) {
      return String(value ?? "").trim();
    }

    function formatLectureDate(dateString) {
      if (!dateString) return "No date";

      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;

      return new Intl.DateTimeFormat("en", {
        month: "short",
        day: "numeric",
        year: "numeric"
      }).format(date);
    }

    function normalizeFile(file) {
      return {
        id: Number(file?.id || 0),
        file_name: clean(file?.file_name),
        file_type: clean(file?.file_type).toUpperCase() || "FILE",
        file_url: clean(file?.file_url),
        thumbnail_url: clean(file?.thumbnail_url),
        sort_order: Number(file?.sort_order || 0)
      };
    }

    function normalizeLecture(item) {
      const files = Array.isArray(item?.files)
        ? item.files.map(normalizeFile).filter(file => file.file_url)
        : [];

      return {
        id: Number(item?.id || 0),
        title: clean(item?.title) || "Untitled Lecture",
        description: clean(item?.description),
        speaker: clean(item?.speaker) || "Unknown speaker",
        lecture_date: clean(item?.lecture_date),
        cover_image_url: clean(item?.cover_image_url),
        files
      };
    }

    function lectureSearchText(lecture) {
      return [
        lecture.title,
        lecture.description,
        lecture.speaker,
        lecture.lecture_date,
        ...lecture.files.map(file => `${file.file_name} ${file.file_type}`)
      ].join(" ").toLowerCase();
    }

    function sortLectures(items) {
      return [...items].sort((a, b) => {
        const aTime = new Date(a.lecture_date || 0).getTime();
        const bTime = new Date(b.lecture_date || 0).getTime();
        return bTime - aTime;
      });
    }

    function updateStats(filtered) {
      const totalFiles = allLectures.reduce((sum, lecture) => sum + lecture.files.length, 0);
      const filteredFiles = filtered.reduce((sum, lecture) => sum + lecture.files.length, 0);

      countBadge.textContent = `إجمالي المحاضرات: ${allLectures.length}`;
      filteredBadge.textContent = `المعروض: ${filtered.length}`;
      filesBadge.textContent = `إجمالي الملفات: ${filteredFiles}/${totalFiles}`;
    }

    function renderFiles(files) {
      if (!files.length) {
        return `
          <div class="files-list">
            <div class="file-link">
              <div class="file-text">
                <div class="file-name">لا توجد ملفات</div>
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="files-list">
          ${files.map((file) => `
            <a class="file-link" href="${escapeHtml(file.file_url)}" target="_blank" rel="noopener">
              <div class="file-text">
                <div class="file-name">${escapeHtml(file.file_name || "Open file")}</div>
                <div class="file-sub">${escapeHtml(file.file_type || "FILE")}</div>
              </div>
              <span class="badge">${escapeHtml(file.file_type || "FILE")}</span>
            </a>
          `).join("")}
        </div>
      `;
    }

    function renderLectures() {
      const query = searchInput.value.trim().toLowerCase();

      const filtered = sortLectures(
        allLectures.filter((lecture) => {
          if (!query) return true;
          return lectureSearchText(lecture).includes(query);
        })
      );

      updateStats(filtered);
      gridEl.innerHTML = "";

      if (!filtered.length) {
        emptyEl.style.display = "block";
        return;
      }

      emptyEl.style.display = "none";

      for (const lecture of filtered) {
        const card = document.createElement("article");
        card.className = "card";

        card.innerHTML = `
          <div
            class="cover"
            style="background-image:url('${String(lecture.cover_image_url || "").replaceAll("'", "%27")}')"
          ></div>

          <div class="card-body">
            <div class="meta-line">
              <span class="speaker">${escapeHtml(lecture.speaker)}</span>
              <span>${escapeHtml(formatLectureDate(lecture.lecture_date))}</span>
            </div>

            <h3 class="title">${escapeHtml(lecture.title)}</h3>

            <div class="desc">${escapeHtml(lecture.description || "لا يوجد وصف.")}</div>

            <div class="files-head">
              <div class="files-title">الملفات (${lecture.files.length})</div>
              ${lecture.files[0] ? `<span class="badge">${escapeHtml(lecture.files[0].file_type || "FILE")}</span>` : ""}
            </div>

            ${renderFiles(lecture.files)}

            <div class="card-actions">
              <a class="btn btn-secondary" href="/admin/edit-lecture/?id=${Number(lecture.id)}">تعديل</a>
              <button class="btn btn-danger" type="button" onclick="deleteLecture(${Number(lecture.id)})">حذف</button>
            </div>
          </div>
        `;

        gridEl.appendChild(card);
      }
    }

    async function loadLectures() {
      try {
        hideStatus();
        loadingEl.style.display = "block";
        emptyEl.style.display = "none";
        gridEl.innerHTML = "";

        const res = await fetch("/api/lectures?published=all");
        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.error || "تعذر تحميل المحاضرات.");
        }

        allLectures = Array.isArray(data.items)
          ? data.items.map(normalizeLecture)
          : [];

        loadingEl.style.display = "none";
        renderLectures();
      } catch (error) {
        loadingEl.style.display = "none";
        emptyEl.style.display = "block";
        emptyEl.textContent = error.message || "حدث خطأ أثناء تحميل المحاضرات.";
      }
    }

    async function deleteLecture(id) {
      const ok = window.confirm("هل أنت متأكد من حذف هذه المحاضرة؟");
      if (!ok) return;

      try {
        const res = await fetch("/api/admin-delete-lecture", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ id })
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.error || "تعذر حذف المحاضرة.");
        }

        allLectures = allLectures.filter(item => Number(item.id) !== Number(id));
        renderLectures();
        showStatus("تم حذف المحاضرة بنجاح.", "ok");
      } catch (error) {
        showStatus(error.message || "حدث خطأ أثناء حذف المحاضرة.", "err");
      }
    }

    async function logout() {
      try {
        const res = await fetch("/api/admin-logout", {
          method: "POST"
        });

        const data = await res.json().catch(() => ({}));

        if (!res.ok) {
          throw new Error(data?.error || "تعذر تسجيل الخروج.");
        }

        window.location.href = "/admin/login/";
      } catch (error) {
        showStatus(error.message || "حدث خطأ أثناء تسجيل الخروج.", "err");
      }
    }

    searchInput.addEventListener("input", renderLectures);
    logoutBtn.addEventListener("click", logout);

    window.deleteLecture = deleteLecture;

    loadLectures();
  </script>
</body>
</html>
