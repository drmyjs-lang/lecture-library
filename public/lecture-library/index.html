<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture Library</title>
  <meta name="theme-color" content="#2563eb" />
  <style>
    :root{
      --bg: #f5f7fb;
      --bg-soft: #eef4ff;
      --card: rgba(255,255,255,0.86);
      --card-solid: #ffffff;
      --text: #14213d;
      --muted: #667085;
      --line: rgba(15, 23, 42, 0.08);
      --blue: #2563eb;
      --blue-2: #1d4ed8;
      --blue-soft: #dbeafe;
      --blue-tint: #eff6ff;
      --shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
      --shadow-soft: 0 10px 30px rgba(15, 23, 42, 0.06);
      --radius-xl: 30px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --max: 1280px;
      --font-stack: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Tahoma, Arial, sans-serif;
    }

    *{
      box-sizing:border-box;
    }

    html{
      scroll-behavior:smooth;
    }

    body{
      margin:0;
      font-family:var(--font-stack);
      color:var(--text);
      background:
        radial-gradient(circle at top left, rgba(37,99,235,0.08), transparent 26%),
        radial-gradient(circle at top right, rgba(37,99,235,0.06), transparent 22%),
        linear-gradient(180deg, #f8fbff 0%, #f5f7fb 100%);
      min-height:100vh;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    .shell{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 18px 60px;
    }

    .hero{
      position:relative;
      overflow:hidden;
      background:linear-gradient(135deg, rgba(255,255,255,0.92), rgba(255,255,255,0.78));
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border:1px solid rgba(255,255,255,0.72);
      box-shadow:var(--shadow);
      border-radius:36px;
      padding:30px;
      display:grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap:28px;
      align-items:center;
      margin-bottom:26px;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:auto -90px -120px auto;
      width:280px;
      height:280px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(37,99,235,0.14), transparent 65%);
      pointer-events:none;
    }

    .hero::after{
      content:"";
      position:absolute;
      inset:-80px auto auto -80px;
      width:220px;
      height:220px;
      border-radius:50%;
      background:radial-gradient(circle, rgba(37,99,235,0.08), transparent 65%);
      pointer-events:none;
    }

    .hero-copy{
      position:relative;
      z-index:1;
    }

    .hero-title{
      margin:0;
      font-size:clamp(34px, 5vw, 58px);
      line-height:1.02;
      letter-spacing:-0.03em;
      font-weight:800;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:24px;
    }

    .btn{
      border:none;
      border-radius:999px;
      padding:13px 18px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
    }

    .btn-primary{
      background:linear-gradient(180deg, var(--blue), var(--blue-2));
      color:#fff;
      box-shadow:0 10px 24px rgba(37,99,235,0.24);
    }

    .btn-secondary{
      background:#fff;
      color:var(--text);
      border:1px solid var(--line);
      box-shadow:var(--shadow-soft);
    }

    .hero-brand{
      position:relative;
      z-index:1;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .hero-brand-card{
      width:100%;
      max-width:430px;
      min-height:240px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,0.72);
      border:1px solid rgba(255,255,255,0.82);
      border-radius:30px;
      padding:22px;
      box-shadow:var(--shadow-soft);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }

    .hero-logo{
      display:block;
      width:100%;
      max-height:220px;
      object-fit:contain;
      border-radius:18px;
      background:transparent;
      padding:0;
    }

    .toolbar{
      background:rgba(255,255,255,0.74);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border:1px solid rgba(255,255,255,0.78);
      border-radius:28px;
      box-shadow:var(--shadow-soft);
      padding:16px;
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:14px;
      align-items:center;
      margin-bottom:28px;
    }

    .search-wrap{
      position:relative;
    }

    .search-wrap svg{
      position:absolute;
      left:16px;
      top:50%;
      transform:translateY(-50%);
      width:18px;
      height:18px;
      color:#94a3b8;
      pointer-events:none;
    }

    .search{
      width:100%;
      min-height:54px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.92);
      padding:0 18px 0 46px;
      font-size:16px;
      outline:none;
      color:var(--text);
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .search:focus{
      border-color:rgba(37,99,235,0.35);
      box-shadow:0 0 0 4px rgba(37,99,235,0.10);
    }

    .select,
    .stat{
      min-height:54px;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(255,255,255,0.92);
      padding:0 16px;
      font-size:15px;
      color:var(--text);
    }

    .select{
      min-width:180px;
      outline:none;
      font-family:inherit;
    }

    .stat{
      display:flex;
      align-items:center;
      gap:10px;
      font-weight:700;
      color:var(--blue);
      white-space:nowrap;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.5);
    }

    .month-section{
      margin-top:32px;
    }

    .month-header{
      display:flex;
      align-items:end;
      justify-content:space-between;
      gap:12px;
      margin-bottom:14px;
      padding:0 4px;
    }

    .month-title{
      margin:0;
      font-size:34px;
      letter-spacing:-0.03em;
    }

    .month-count{
      color:var(--muted);
      font-weight:600;
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:20px;
    }

    .card{
      display:flex;
      flex-direction:column;
      min-height:100%;
      background:var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border:1px solid rgba(255,255,255,0.78);
      border-radius:28px;
      overflow:hidden;
      box-shadow:var(--shadow-soft);
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .card:hover{
      transform:translateY(-3px);
      box-shadow:0 18px 40px rgba(15, 23, 42, 0.10);
    }

    .cover{
      position:relative;
      aspect-ratio:16 / 9;
      background:#f8fafc center/cover no-repeat;
      border-bottom:1px solid rgba(15, 23, 42, 0.06);
    }

    .cover::after{
      content:"";
      position:absolute;
      inset:auto 0 0 0;
      height:55%;
      background:linear-gradient(180deg, rgba(255,255,255,0), rgba(255,255,255,0.12));
      pointer-events:none;
    }

    .card-body{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:12px;
      flex:1;
    }

    .meta-line{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:14px;
    }

    .speaker{
      font-weight:700;
      color:var(--blue);
    }

    .title{
      margin:0;
      font-size:29px;
      letter-spacing:-0.03em;
      line-height:1.08;
      font-weight:800;
    }

    .desc{
      color:var(--muted);
      line-height:1.9;
      font-size:15px;
      display:-webkit-box;
      -webkit-line-clamp:4;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:108px;
    }

    .files-head{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-top:auto;
      padding-top:6px;
    }

    .files-title{
      font-size:14px;
      font-weight:800;
      color:var(--text);
    }

    .badge{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:6px;
      padding:8px 12px;
      border-radius:999px;
      background:var(--blue-tint);
      color:var(--blue);
      font-size:12px;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:0.03em;
      border:1px solid rgba(37,99,235,0.10);
    }

    .files-list{
      display:grid;
      gap:10px;
    }

    .file-link{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:12px 14px;
      background:rgba(255,255,255,0.8);
      border:1px solid rgba(15, 23, 42, 0.07);
      border-radius:18px;
      transition:background .15s ease, border-color .15s ease, transform .15s ease;
    }

    .file-link:hover{
      background:#fff;
      border-color:rgba(37,99,235,0.20);
      transform:translateY(-1px);
    }

    .file-text{
      min-width:0;
    }

    .file-name{
      font-size:15px;
      font-weight:700;
      line-height:1.5;
      color:var(--text);
      word-break:break-word;
    }

    .file-sub{
      margin-top:4px;
      color:var(--muted);
      font-size:12px;
    }

    .empty,
    .loading{
      background:rgba(255,255,255,0.74);
      border:1px solid rgba(255,255,255,0.78);
      border-radius:28px;
      box-shadow:var(--shadow-soft);
      padding:32px 22px;
      text-align:center;
      color:var(--muted);
      font-size:16px;
    }

    .footer-note{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      padding-top:30px;
    }

    @media (max-width: 1120px){
      .grid{
        grid-template-columns:repeat(2, minmax(0, 1fr));
      }

      .hero{
        grid-template-columns:1fr;
      }

      .hero-brand{
        justify-content:flex-start;
      }
    }

    @media (max-width: 780px){
      .toolbar{
        grid-template-columns:1fr;
      }

      .grid{
        grid-template-columns:1fr;
      }

      .hero{
        padding:22px;
      }

      .hero-title{
        font-size:40px;
      }

      .month-title{
        font-size:28px;
      }

      .stat,
      .select,
      .search{
        min-height:50px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-copy">
        <h1 class="hero-title">Lecture Library</h1>

        <div class="hero-actions">
          <a class="btn btn-primary" href="#libraryGrid">Browse Lectures</a>
          <a class="btn btn-secondary" href="/admin/login/">Admin Login</a>
        </div>
      </div>

      <div class="hero-brand">
        <div class="hero-brand-card">
          <img
            class="hero-logo"
            src="/assets/alahsa-health-cluster-logo.jpg.jpg"
            alt="Alahsa Health Cluster Logo"
            onerror="this.style.display='none';"
          />
        </div>
      </div>
    </section>

    <section class="toolbar">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="7"></circle>
          <path d="M20 20L17 17"></path>
        </svg>
        <input
          id="searchInput"
          class="search"
          type="text"
          placeholder="Search by title, speaker, description, or file name..."
        />
      </div>

      <select id="sortSelect" class="select">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
        <option value="title">Title A–Z</option>
      </select>

      <div id="totalCount" class="stat">Lectures: 0</div>
    </section>

    <div id="loading" class="loading">Loading lectures...</div>
    <div id="empty" class="empty" style="display:none;">No lectures found.</div>
    <div id="libraryGrid"></div>

    <div class="footer-note">
      Powered by Lecture Library
    </div>
  </div>

  <script>
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");
    const totalCount = document.getElementById("totalCount");
    const loadingEl = document.getElementById("loading");
    const emptyEl = document.getElementById("empty");
    const libraryGrid = document.getElementById("libraryGrid");

    let allLectures = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function clean(value) {
      return String(value ?? "").trim();
    }

    function getMonthLabel(dateString) {
      if (!dateString) return "Unknown Month";

      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;

      return new Intl.DateTimeFormat("en", {
        month: "long",
        year: "numeric"
      }).format(date);
    }

    function formatLectureDate(dateString) {
      if (!dateString) return "No date";

      const date = new Date(dateString);
      if (Number.isNaN(date.getTime())) return dateString;

      return new Intl.DateTimeFormat("en", {
        month: "short",
        day: "numeric",
        year: "numeric"
      }).format(date);
    }

    function normalizeFile(file) {
      return {
        id: Number(file?.id || 0),
        file_name: clean(file?.file_name),
        file_type: clean(file?.file_type).toUpperCase() || "FILE",
        file_url: clean(file?.file_url),
        thumbnail_url: clean(file?.thumbnail_url),
        sort_order: Number(file?.sort_order || 0)
      };
    }

    function normalizeLecture(item) {
      const files = Array.isArray(item?.files)
        ? item.files.map(normalizeFile).filter(file => file.file_url)
        : [];

      return {
        id: Number(item?.id || 0),
        title: clean(item?.title) || "Untitled Lecture",
        description: clean(item?.description),
        speaker: clean(item?.speaker) || "Unknown speaker",
        lecture_date: clean(item?.lecture_date),
        cover_image_url: clean(item?.cover_image_url),
        files
      };
    }

    function lectureSearchText(lecture) {
      return [
        lecture.title,
        lecture.description,
        lecture.speaker,
        lecture.lecture_date,
        ...lecture.files.map(file => `${file.file_name} ${file.file_type}`)
      ].join(" ").toLowerCase();
    }

    function sortLectures(items) {
      const sortValue = sortSelect.value;

      return [...items].sort((a, b) => {
        if (sortValue === "title") {
          return a.title.localeCompare(b.title);
        }

        const aTime = new Date(a.lecture_date || 0).getTime();
        const bTime = new Date(b.lecture_date || 0).getTime();

        if (sortValue === "oldest") {
          return aTime - bTime;
        }

        return bTime - aTime;
      });
    }

    function groupLecturesByMonth(items) {
      const grouped = new Map();

      for (const lecture of items) {
        const key = getMonthLabel(lecture.lecture_date);

        if (!grouped.has(key)) {
          grouped.set(key, []);
        }

        grouped.get(key).push(lecture);
      }

      return grouped;
    }

    function renderFiles(files) {
      if (!files.length) {
        return `
          <div class="files-list">
            <div class="file-link">
              <div class="file-text">
                <div class="file-name">No files available</div>
              </div>
            </div>
          </div>
        `;
      }

      return `
        <div class="files-list">
          ${files.map((file) => `
            <a class="file-link" href="${escapeHtml(file.file_url)}" target="_blank" rel="noopener">
              <div class="file-text">
                <div class="file-name">${escapeHtml(file.file_name || "Open file")}</div>
                <div class="file-sub">${escapeHtml(file.file_type || "FILE")}</div>
              </div>
              <span class="badge">${escapeHtml(file.file_type || "FILE")}</span>
            </a>
          `).join("")}
        </div>
      `;
    }

    function renderLectures() {
      const query = searchInput.value.trim().toLowerCase();

      const filtered = sortLectures(
        allLectures.filter((lecture) => {
          if (!query) return true;
          return lectureSearchText(lecture).includes(query);
        })
      );

      totalCount.textContent = `Lectures: ${filtered.length}`;
      libraryGrid.innerHTML = "";

      if (!filtered.length) {
        emptyEl.style.display = "block";
        return;
      }

      emptyEl.style.display = "none";

      const grouped = groupLecturesByMonth(filtered);

      for (const [monthLabel, lectures] of grouped.entries()) {
        const section = document.createElement("section");
        section.className = "month-section";

        section.innerHTML = `
          <div class="month-header">
            <h2 class="month-title">${escapeHtml(monthLabel)}</h2>
            <div class="month-count">${lectures.length} lecture${lectures.length > 1 ? "s" : ""}</div>
          </div>
          <div class="grid">
            ${lectures.map((lecture) => `
              <article class="card">
                <div
                  class="cover"
                  style="background-image:url('${String(lecture.cover_image_url || "").replaceAll("'", "%27")}')"
                ></div>

                <div class="card-body">
                  <div class="meta-line">
                    <span class="speaker">${escapeHtml(lecture.speaker)}</span>
                    <span>${escapeHtml(formatLectureDate(lecture.lecture_date))}</span>
                  </div>

                  <h3 class="title">${escapeHtml(lecture.title)}</h3>

                  <div class="desc">${escapeHtml(lecture.description || "No description available.")}</div>

                  <div class="files-head">
                    <div class="files-title">Files (${lecture.files.length})</div>
                    ${lecture.files[0] ? `<span class="badge">${escapeHtml(lecture.files[0].file_type || "FILE")}</span>` : ""}
                  </div>

                  ${renderFiles(lecture.files)}
                </div>
              </article>
            `).join("")}
          </div>
        `;

        libraryGrid.appendChild(section);
      }
    }

    async function loadLectures() {
      try {
        loadingEl.style.display = "block";
        emptyEl.style.display = "none";
        libraryGrid.innerHTML = "";

        const res = await fetch("/api/lectures");
        const data = await res.json();

        if (!res.ok) {
          throw new Error(data?.error || "Failed to load lectures.");
        }

        allLectures = Array.isArray(data.items)
          ? data.items.map(normalizeLecture)
          : [];

        loadingEl.style.display = "none";
        renderLectures();
      } catch (error) {
        loadingEl.style.display = "none";
        emptyEl.style.display = "block";
        emptyEl.textContent = error.message || "Failed to load lectures.";
      }
    }

    searchInput.addEventListener("input", renderLectures);
    sortSelect.addEventListener("change", renderLectures);

    loadLectures();
  </script>
</body>
</html>
