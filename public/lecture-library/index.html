<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مكتبة المحاضرات</title>
  <meta name="theme-color" content="#0d6fb8" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

  <style>
    :root {
      /* متغيرات الهوية البصرية الموحدة */
      --bg: #eef5ff;
      --bg-soft: #f8fbff;
      --card: rgba(255, 255, 255, 0.88);
      --card-solid: #ffffff;
      --text: #10243e;
      --muted: #5f738d;
      --line: rgba(13, 111, 184, 0.14);
      --blue: #0d6fb8;
      --blue-dark: #084a86;
      --blue-soft: #3ca3d8;
      --blue-pale: #dff1ff;
      --shadow-lg: 0 28px 70px rgba(11, 64, 122, 0.14);
      --shadow-md: 0 18px 40px rgba(15, 78, 145, 0.1);
      --shadow-sm: 0 10px 24px rgba(17, 72, 128, 0.08);
      --radius-xl: 34px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
      --transition: 0.22s ease;
      --font-stack: "Manrope", "IBM Plex Sans Arabic", sans-serif;
      --max: 1240px;
    }

    *{ box-sizing:border-box; }

    html{ scroll-behavior:smooth; }

    body{
      margin:0;
      font-family:var(--font-stack);
      color:var(--text);
      background:
        radial-gradient(circle at top right, rgba(60, 163, 216, 0.18), transparent 28%),
        radial-gradient(circle at bottom left, rgba(13, 111, 184, 0.1), transparent 32%),
        linear-gradient(180deg, #f5faff 0%, #edf5ff 52%, #eaf2fc 100%);
      min-height:100vh;
    }

    a{ color:inherit; text-decoration:none; }

    .shell{
      max-width:var(--max);
      margin:0 auto;
      padding:28px 18px 60px;
    }

    /* Hero Section */
    .hero{
      position:relative;
      overflow:hidden;
      background: rgba(255,255,255,0.66);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.62);
      box-shadow:var(--shadow-sm);
      border-radius:var(--radius-xl);
      padding:40px;
      display:grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap:28px;
      align-items:center;
      margin-bottom:26px;
    }

    .hero-title{
      margin:0;
      font-size:clamp(34px, 5vw, 56px);
      line-height:1.1;
      letter-spacing:-0.03em;
      font-weight:800;
    }

    .hero-actions{
      display:flex;
      flex-wrap:wrap;
      gap:12px;
      margin-top:24px;
    }

    .btn{
      border:none;
      border-radius:18px;
      padding:14px 24px;
      font-size:15px;
      font-weight:800;
      cursor:pointer;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:8px;
      transition:all var(--transition);
      font-family:inherit;
    }

    .btn:hover{ transform:translateY(-2px); }

    .btn-primary{
      background:linear-gradient(135deg, var(--blue), var(--blue-dark));
      color:#fff;
      box-shadow:0 18px 34px rgba(13,111,184,0.26);
    }

    .btn-secondary{
      background:rgba(255,255,255,0.8);
      color:var(--text);
      border:1px solid var(--line);
    }

    .hero-brand-card{
      background:rgba(255,255,255,0.74);
      border:1px solid rgba(13,111,184,0.08);
      border-radius:24px;
      padding:22px;
      backdrop-filter: blur(14px);
      display:flex;
      justify-content:center;
    }

    .hero-logo{
      max-width:100%;
      max-height:180px;
      object-fit:contain;
    }

    /* Toolbar */
    .toolbar{
      background:rgba(255,255,255,0.7);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      border:1px solid rgba(255,255,255,0.7);
      border-radius:var(--radius-lg);
      box-shadow:var(--shadow-sm);
      padding:16px;
      display:grid;
      grid-template-columns: 1fr auto auto;
      gap:14px;
      align-items:center;
      margin-bottom:32px;
    }

    .search-wrap{ position:relative; }

    .search{
      width:100%;
      min-height:56px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 20px;
      font-size:16px;
      outline:none;
      color:var(--text);
      font-family:inherit;
      transition: all var(--transition);
    }

    .search:focus{
      border-color:var(--blue);
      box-shadow:0 0 0 4px rgba(13,111,184,0.1);
    }

    .select, .stat{
      min-height:56px;
      border-radius:18px;
      border:1px solid var(--line);
      background:#fff;
      padding:0 16px;
      font-size:15px;
      font-family:inherit;
      font-weight:700;
    }

    .stat{
      display:flex;
      align-items:center;
      color:var(--blue);
    }

    /* Grid & Cards */
    .month-section{ margin-top:40px; }
    .month-header{
      display:flex;
      align-items:baseline;
      gap:12px;
      margin-bottom:20px;
    }
    .month-title{
      font-size:32px;
      font-weight:800;
      margin:0;
    }
    .month-count{ color:var(--muted); font-weight:600; }

    .grid{
      display:grid;
      grid-template-columns:repeat(3, minmax(0, 1fr));
      gap:24px;
    }

    .card{
      background:var(--card);
      backdrop-filter: blur(20px);
      border:1px solid rgba(255,255,255,0.7);
      border-radius:var(--radius-lg);
      overflow:hidden;
      box-shadow:var(--shadow-md);
      transition:transform var(--transition), box-shadow var(--transition);
      display:flex;
      flex-direction:column;
    }

    .card:hover{
      transform:translateY(-5px);
      box-shadow:var(--shadow-lg);
    }

    .cover{
      aspect-ratio:16/9;
      background:#f0f7ff center/cover no-repeat;
      border-bottom:1px solid var(--line);
    }

    .card-body{ padding:22px; flex:1; display:flex; flex-direction:column; gap:12px; }

    .meta-line{
      display:flex;
      justify-content:space-between;
      font-size:13px;
      color:var(--muted);
      font-weight:700;
    }

    .speaker{ color:var(--blue); font-weight:800; line-height:1.5; }

    .title{
      margin:0;
      font-size:24px;
      font-weight:800;
      line-height:1.2;
    }

    .desc{
      font-size:14px;
      color:var(--muted);
      line-height:1.8;
      display:-webkit-box;
      -webkit-line-clamp:3;
      -webkit-box-orient:vertical;
      overflow:hidden;
      min-height:75px;
    }

    .files-list{ display:grid; gap:10px; margin-top:10px; }

    .file-link{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:12px 16px;
      background:rgba(13,111,184,0.05);
      border-radius:14px;
      border:1px solid transparent;
      transition:all var(--transition);
    }

    .file-link:hover{
      background:#fff;
      border-color:var(--blue);
      transform:translateX(-4px);
    }

    .file-name{ font-size:14px; font-weight:700; }

    .badge{
      padding:4px 8px;
      background:var(--blue-pale);
      color:var(--blue);
      border-radius:8px;
      font-size:10px;
      font-weight:800;
      text-transform:uppercase;
    }

    .loading, .empty{
      padding:60px;
      text-align:center;
      background:var(--card);
      border-radius:var(--radius-lg);
      color:var(--muted);
      font-weight:700;
    }

    @media (max-width: 1024px){ .grid{ grid-template-columns: 1fr 1fr; } .hero{ grid-template-columns: 1fr; } }
    @media (max-width: 768px){ 
      .grid{ grid-template-columns: 1fr; } 
      .toolbar{ grid-template-columns: 1fr; }
      .hero-title{ font-size:32px; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="hero">
      <div class="hero-copy">
        <h1 class="hero-title">مكتبة المحاضرات</h1>
        <p style="color:var(--muted); margin-top:10px; line-height:1.8;">تصفح وحمل المواد العلمية والمحاضرات الخاصة بتجمع الأحساء الصحي.</p>

        <div class="hero-actions">
          <a class="btn btn-primary" href="#libraryGrid">تصفح المحاضرات</a>
          <a class="btn btn-secondary" href="/admin/login/">دخول الإدارة</a>
        </div>
      </div>

      <div class="hero-brand">
        <div class="hero-brand-card">
          <img
            class="hero-logo"
            src="/assets/alahsa-health-cluster-logo.jpg.jpg"
            alt="Alahsa Health Cluster Logo"
            onerror="this.style.display='none';"
          />
        </div>
      </div>
    </section>

    <section class="toolbar">
      <div class="search-wrap">
        <input
          id="searchInput"
          class="search"
          type="text"
          placeholder="بحث بالعنوان، المتحدث، أو اسم الملف..."
        />
      </div>

      <select id="sortSelect" class="select">
        <option value="newest">الأحدث أولاً</option>
        <option value="oldest">الأقدم أولاً</option>
        <option value="title">العنوان أ-ي</option>
      </select>

      <div id="totalCount" class="stat">المحاضرات: 0</div>
    </section>

    <div id="loading" class="loading">جاري تحميل المحاضرات...</div>
    <div id="empty" class="empty" style="display:none;">لم يتم العثور على محاضرات تطابق بحثك.</div>
    <div id="libraryGrid"></div>

    <div style="text-align:center; padding-top:40px; color:var(--muted); font-size:13px;">
      تجمع الأحساء الصحي &copy; 2024
    </div>
  </div>

  <script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";

    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");
    const totalCount = document.getElementById("totalCount");
    const loadingEl = document.getElementById("loading");
    const emptyEl = document.getElementById("empty");
    const libraryGrid = document.getElementById("libraryGrid");

    let allLectures = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function isPdfFile(file) {
      const type = String(file?.file_type || "").toLowerCase();
      const name = String(file?.file_name || "").toLowerCase();
      return type === "pdf" || name.endsWith(".pdf");
    }

    function buildPdfProxyUrl(fileUrl) {
      return `/api/file-proxy?url=${encodeURIComponent(fileUrl)}`;
    }

    function makePlaceholderCoverDataUrl(label = "محاضرة") {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
          <rect width="1200" height="675" fill="#eef2ff"/>
          <text x="600" y="350" font-size="60" font-weight="800" font-family="Arial, sans-serif" fill="#0d6fb8" text-anchor="middle" direction="rtl">${label}</text>
        </svg>
      `.trim();
      return `data:image/svg+xml;charset=UTF-8,${encodeURIComponent(svg)}`;
    }

    function getMonthLabel(dateString) {
      if (!dateString) return "تاريخ غير محدد";
      const date = new Date(dateString);
      return new Intl.DateTimeFormat("ar-SA", { month: "long", year: "numeric" }).format(date);
    }

    function formatLectureDate(dateString) {
      if (!dateString) return "-";
      return new Intl.DateTimeFormat("ar-SA", { day: "numeric", month: "short", year: "numeric" }).format(new Date(dateString));
    }

    async function renderPdfFirstPageToCover(element, pdfUrl) {
      try {
        const pdf = await pdfjsLib.getDocument(pdfUrl).promise;
        const page = await pdf.getPage(1);
        const viewport = page.getViewport({ scale: 1.0 });
        const canvas = document.createElement("canvas");
        const context = canvas.getContext("2d");
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await page.render({ canvasContext: context, viewport }).promise;
        element.style.backgroundImage = `url('${canvas.toDataURL("image/jpeg", 0.8)}')`;
      } catch (e) { console.error("PDF Preview Error", e); }
    }

    function renderLectures() {
      const query = searchInput.value.trim().toLowerCase();
      let filtered = allLectures.filter(l => 
        l.title.toLowerCase().includes(query) || 
        l.speaker.toLowerCase().includes(query) || 
        (l.description || "").toLowerCase().includes(query)
      );

      const sort = sortSelect.value;
      filtered.sort((a, b) => {
        if (sort === "title") return a.title.localeCompare(b.title);
        const da = new Date(a.lecture_date), db = new Date(b.lecture_date);
        return sort === "oldest" ? da - db : db - da;
      });

      totalCount.textContent = `المحاضرات: ${filtered.length}`;
      libraryGrid.innerHTML = "";
      
      if (!filtered.length) {
        emptyEl.style.display = "block";
        loadingEl.style.display = "none";
        return;
      }
      emptyEl.style.display = "none";

      const months = new Map();
      filtered.forEach(l => {
        const m = getMonthLabel(l.lecture_date);
        if (!months.has(m)) months.set(m, []);
        months.get(m).push(l);
      });

      for (const [month, lectures] of months) {
        const section = document.createElement("div");
        section.className = "month-section";
        section.innerHTML = `
          <div class="month-header">
            <h2 class="month-title">${month}</h2>
            <span class="month-count">${lectures.length} محاضرة</span>
          </div>
          <div class="grid">
            ${lectures.map(l => {
              const firstPdf = l.files.find(isPdfFile);
              const cover = l.stored_cover_image_url || l.effective_cover_image_url || makePlaceholderCoverDataUrl(l.title);
              return `
                <article class="card">
                  <div class="cover" style="background-image:url('${cover}')" id="cov-${l.id}"></div>
                  <div class="card-body">
                    <div class="meta-line">
                      <span class="speaker">${escapeHtml(l.speaker)}</span>
                      <span>${formatLectureDate(l.lecture_date)}</span>
                    </div>
                    <h3 class="title">${escapeHtml(l.title)}</h3>
                    <div class="desc">${escapeHtml(l.description || "لا يوجد وصف لهذه المحاضرة.")}</div>
                    <div class="files-list">
                      ${l.files.map(f => `
                        <a href="${f.file_url}" target="_blank" class="file-link">
                          <span class="file-name">${escapeHtml(f.file_name)}</span>
                          <span class="badge">${f.file_type}</span>
                        </a>
                      `).join("")}
                    </div>
                  </div>
                </article>
              `;
            }).join("")}
          </div>
        `;
        libraryGrid.appendChild(section);

        // تحميل معاينة الـ PDF إذا لم يكن هناك غلاف
        lectures.forEach(l => {
          if (!l.stored_cover_image_url && !l.effective_cover_image_url) {
            const firstPdf = l.files.find(isPdfFile);
            if (firstPdf) {
              const el = document.getElementById(`cov-${l.id}`);
              renderPdfFirstPageToCover(el, buildPdfProxyUrl(firstPdf.file_url));
            }
          }
        });
      }
    }

    async function load() {
      try {
        const res = await fetch("/api/lectures?published=all");
        const data = await res.json();
        allLectures = data.items || [];
        loadingEl.style.display = "none";
        renderLectures();
      } catch (e) {
        loadingEl.textContent = "فشل تحميل البيانات.";
      }
    }

    searchInput.addEventListener("input", renderLectures);
    sortSelect.addEventListener("change", renderLectures);
    load();
  </script>
</body>
</html>
