<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture Library</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f6f8fb;
      color: #1f2937;
    }
    .wrap {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .topbar h1 {
      margin: 0;
      font-size: 32px;
    }
    .topbar a {
      color: #2563eb;
      text-decoration: none;
      font-weight: 700;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 12px;
      margin-bottom: 24px;
    }
    .toolbar input,
    .toolbar select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 14px;
      padding: 13px 14px;
      font: inherit;
      background: white;
    }
    .month-group {
      margin-bottom: 36px;
    }
    .month-title {
      margin: 0 0 16px;
      font-size: 22px;
      color: #111827;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 18px;
    }
    .card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 28px rgba(0,0,0,0.08);
      display: flex;
      flex-direction: column;
    }
    .thumb {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #eef2ff;
      display: block;
    }
    .card-body {
      padding: 18px;
    }
    .card h3 {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.3;
    }
    .meta {
      color: #6b7280;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .desc {
      color: #374151;
      margin-bottom: 14px;
      line-height: 1.6;
    }
    .files-title {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .file-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .file-link {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 12px;
      background: #f9fafb;
      text-decoration: none;
      color: #1f2937;
      border: 1px solid #e5e7eb;
    }
    .file-link:hover {
      background: #eef2ff;
      border-color: #c7d2fe;
    }
    .badge {
      font-size: 12px;
      background: #dbeafe;
      color: #1d4ed8;
      padding: 4px 8px;
      border-radius: 999px;
      white-space: nowrap;
    }
    .empty,
    .loading,
    .error {
      background: white;
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 10px 28px rgba(0,0,0,0.06);
    }
    .muted {
      color: #6b7280;
    }
    @media (max-width: 760px) {
      .toolbar {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Lecture Library</h1>
        <div class="muted">Search, sort, and browse lectures by month.</div>
      </div>
      <a href="/admin/lecture-upload/">Admin Upload</a>
    </div>

    <div class="toolbar">
      <input id="searchInput" type="text" placeholder="Search by title, speaker, or description..." />
      <select id="sortSelect">
        <option value="newest">Newest first</option>
        <option value="oldest">Oldest first</option>
      </select>
    </div>

    <div id="stateBox" class="loading">Loading lectures...</div>
    <div id="content"></div>
  </div>

  <script>
    const stateBox = document.getElementById("stateBox");
    const content = document.getElementById("content");
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");

    let debounceTimer = null;

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function defaultThumb() {
      const svg = `
        <svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
          <rect width="1200" height="675" fill="#eef2ff"/>
          <rect x="390" y="170" width="420" height="250" rx="20" fill="#c7d2fe"/>
          <rect x="430" y="210" width="340" height="18" rx="9" fill="#6366f1"/>
          <rect x="430" y="250" width="280" height="18" rx="9" fill="#818cf8"/>
          <rect x="430" y="290" width="310" height="18" rx="9" fill="#a5b4fc"/>
          <text x="600" y="500" text-anchor="middle" font-size="42" font-family="Arial, sans-serif" fill="#3730a3">Lecture</text>
        </svg>
      `;
      return "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
    }

    function getThumbnail(lecture) {
      if (lecture.cover_image_url) return lecture.cover_image_url;

      const fileWithThumb = (lecture.files || []).find(file => file.thumbnail_url);
      if (fileWithThumb) return fileWithThumb.thumbnail_url;

      return defaultThumb();
    }

    function formatMonth(dateStr) {
      const date = new Date(dateStr);
      if (Number.isNaN(date.getTime())) return "Unknown Month";
      return date.toLocaleString("en-US", {
        month: "long",
        year: "numeric"
      });
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      if (Number.isNaN(date.getTime())) return dateStr || "";
      return date.toLocaleDateString("en-US", {
        year: "numeric",
        month: "short",
        day: "numeric"
      });
    }

    function groupByMonth(items) {
      const map = new Map();

      for (const item of items) {
        const key = formatMonth(item.lecture_date);
        if (!map.has(key)) map.set(key, []);
        map.get(key).push(item);
      }

      return Array.from(map.entries()).map(([month, lectures]) => ({
        month,
        lectures
      }));
    }

    function renderFiles(files) {
      if (!files || !files.length) {
        return `<div class="muted">No files attached.</div>`;
      }

      return `
        <div class="file-list">
          ${files.map(file => `
            <a class="file-link" href="${escapeHtml(file.file_url)}" target="_blank" rel="noopener noreferrer">
              <span>${escapeHtml(file.file_name)}</span>
              <span class="badge">${escapeHtml((file.file_type || "file").toUpperCase())}</span>
            </a>
          `).join("")}
        </div>
      `;
    }

    function renderLectures(items) {
      if (!items.length) {
        stateBox.className = "empty";
        stateBox.textContent = "No lectures found.";
        content.innerHTML = "";
        return;
      }

      stateBox.style.display = "none";

      const groups = groupByMonth(items);

      content.innerHTML = groups.map(group => `
        <section class="month-group">
          <h2 class="month-title">${escapeHtml(group.month)}</h2>
          <div class="cards">
            ${group.lectures.map(lecture => `
              <article class="card">
                <img class="thumb" src="${escapeHtml(getThumbnail(lecture))}" alt="${escapeHtml(lecture.title)}" />
                <div class="card-body">
                  <h3>${escapeHtml(lecture.title)}</h3>
                  <div class="meta">
                    ${escapeHtml(lecture.speaker || "Unknown speaker")} • ${escapeHtml(formatDate(lecture.lecture_date))}
                  </div>
                  <div class="desc">${escapeHtml(lecture.description || "No description.")}</div>
                  <div class="files-title">Files (${lecture.files ? lecture.files.length : 0})</div>
                  ${renderFiles(lecture.files || [])}
                </div>
              </article>
            `).join("")}
          </div>
        </section>
      `).join("");
    }

    async function loadLectures() {
      stateBox.style.display = "block";
      stateBox.className = "loading";
      stateBox.textContent = "Loading lectures...";
      content.innerHTML = "";

      try {
        const q = searchInput.value.trim();
        const sort = sortSelect.value;

        const url = new URL("/api/lectures", window.location.origin);
        if (q) url.searchParams.set("q", q);
        url.searchParams.set("sort", sort);

        const res = await fetch(url.toString(), {
          headers: {
            "Accept": "application/json"
          }
        });

        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.error || "Failed to load lectures.");
        }

        renderLectures(data.items || []);
      } catch (error) {
        stateBox.className = "error";
        stateBox.textContent = error.message || "Something went wrong while loading the library.";
        content.innerHTML = "";
      }
    }

    searchInput.addEventListener("input", () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(loadLectures, 350);
    });

    sortSelect.addEventListener("change", loadLectures);

    loadLectures();
  </script>
</body>
</html>
